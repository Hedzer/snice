<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Demo</title>
  <style>
    body {
      padding: 40px;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
    }

    .section {
      margin-bottom: 40px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    h3 {
      margin-bottom: 16px;
      font-size: 1.125rem;
      color: #6b7280;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .row > * {
      flex: 1;
    }

    .vertical-demo {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }
  </style>
</head>
<body>
  <h1>Slider Component Demo</h1>

  <div class="section">
    <h2>Basic</h2>
    <div class="slider-group">
      <snice-slider label="Default Slider"></snice-slider>
      <snice-slider label="With Value" value="50"></snice-slider>
      <snice-slider label="Show Value" value="75" show-value></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>Variants</h2>
    <div class="slider-group">
      <snice-slider variant="default" label="Default" value="50" show-value></snice-slider>
      <snice-slider variant="primary" label="Primary" value="50" show-value></snice-slider>
      <snice-slider variant="success" label="Success" value="50" show-value></snice-slider>
      <snice-slider variant="warning" label="Warning" value="50" show-value></snice-slider>
      <snice-slider variant="danger" label="Danger" value="50" show-value></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>Sizes</h2>
    <div class="slider-group">
      <snice-slider size="small" label="Small" value="30"></snice-slider>
      <snice-slider size="medium" label="Medium" value="50"></snice-slider>
      <snice-slider size="large" label="Large" value="70"></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>Range and Steps</h2>
    <div class="slider-group">
      <snice-slider label="0-100 (default)" min="0" max="100" value="50" show-value></snice-slider>
      <snice-slider label="Temperature (60-80°F)" min="60" max="80" value="72" show-value step="0.5"></snice-slider>
      <snice-slider label="Percentage (5% increments)" min="0" max="100" step="5" value="35" show-value></snice-slider>
      <snice-slider label="Rating (1-10)" min="1" max="10" step="1" value="7" show-value></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>With Ticks</h2>
    <div class="slider-group">
      <snice-slider label="Rating (0-10)" min="0" max="10" step="1" value="5" show-ticks show-value></snice-slider>
      <snice-slider label="Stars (1-5)" min="1" max="5" step="1" value="3" show-ticks show-value variant="warning"></snice-slider>
      <snice-slider label="Level (0-5)" min="0" max="5" step="1" value="2" show-ticks show-value variant="success"></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>Helper Text</h2>
    <div class="slider-group">
      <snice-slider label="Volume" value="75" show-value helper-text="Adjust the speaker volume"></snice-slider>
      <snice-slider label="Brightness" value="60" show-value helper-text="Screen brightness level"></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>Error State</h2>
    <div class="slider-group">
      <snice-slider invalid error-text="Value out of acceptable range" label="Temperature" value="95" show-value></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>States</h2>
    <div class="slider-group">
      <snice-slider disabled label="Disabled" value="50"></snice-slider>
      <snice-slider readonly label="Readonly" value="75"></snice-slider>
      <snice-slider required label="Required" value="25"></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>Vertical Sliders</h2>
    <div class="vertical-demo">
      <snice-slider vertical label="Volume" value="60" show-value></snice-slider>
      <snice-slider vertical label="Bass" value="40" show-value variant="primary"></snice-slider>
      <snice-slider vertical label="Treble" value="55" show-value variant="success"></snice-slider>
      <snice-slider vertical label="Balance" min="-100" max="100" value="0" show-value show-ticks step="25"></snice-slider>
    </div>
  </div>

  <div class="section">
    <h2>Interactive Demo</h2>
    <snice-slider
      id="interactive-slider"
      label="Adjust Value"
      min="0"
      max="100"
      value="50"
      show-value
    ></snice-slider>
    <div id="output" style="margin-top: 20px; padding: 10px; background: #f3f4f6; border-radius: 4px;">
      <strong>Current value:</strong> <span id="current-value">50</span><br>
      <strong>Last changed:</strong> <span id="last-changed">-</span>
    </div>
  </div>

  <div class="section">
    <h2>Form Integration</h2>
    <form id="demo-form">
      <div class="slider-group">
        <snice-slider
          name="volume"
          label="Volume"
          min="0"
          max="100"
          value="50"
          required
          show-value
        ></snice-slider>
        <snice-slider
          name="brightness"
          label="Brightness"
          min="0"
          max="100"
          value="75"
          show-value
        ></snice-slider>
        <button type="submit">Submit</button>
      </div>
    </form>
    <div id="form-output"></div>
  </div>

  <script type="module">
    import './snice-slider.ts';

    // Interactive demo
    const interactiveSlider = document.getElementById('interactive-slider');
    const currentValue = document.getElementById('current-value');
    const lastChanged = document.getElementById('last-changed');

    interactiveSlider.addEventListener('@snice/slider-input', (e) => {
      currentValue.textContent = e.detail.value;
    });

    interactiveSlider.addEventListener('@snice/slider-change', (e) => {
      lastChanged.textContent = e.detail.value;
    });

    // Form demo
    document.getElementById('demo-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      document.getElementById('form-output').innerHTML = `
        <strong>Submitted:</strong><br>
        Volume: ${formData.get('volume')}<br>
        Brightness: ${formData.get('brightness')}
      `;
    });
  </script>
</body>
</html>
