<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    snice-slider { width: 280px; }
  </style>
</head>
<body>

<h2>Variants</h2>
<div class="row">
  <snice-slider variant="default" value="40" label="Default"></snice-slider>
  <snice-slider variant="primary" value="40" label="Primary"></snice-slider>
  <snice-slider variant="success" value="40" label="Success"></snice-slider>
  <snice-slider variant="warning" value="40" label="Warning"></snice-slider>
  <snice-slider variant="danger" value="40" label="Danger"></snice-slider>
</div>

<h2>Sizes</h2>
<div class="row">
  <snice-slider size="small" value="50" label="Small"></snice-slider>
  <snice-slider size="medium" value="50" label="Medium"></snice-slider>
  <snice-slider size="large" value="50" label="Large"></snice-slider>
</div>

<h2>Variant x Size Matrix</h2>
<div style="display: grid; grid-template-columns: repeat(3, 280px); gap: 0.75rem;">
  <snice-slider variant="default" size="small" value="30" label="default + small"></snice-slider>
  <snice-slider variant="default" size="medium" value="30" label="default + medium"></snice-slider>
  <snice-slider variant="default" size="large" value="30" label="default + large"></snice-slider>
  <snice-slider variant="primary" size="small" value="50" label="primary + small"></snice-slider>
  <snice-slider variant="primary" size="medium" value="50" label="primary + medium"></snice-slider>
  <snice-slider variant="primary" size="large" value="50" label="primary + large"></snice-slider>
  <snice-slider variant="success" size="small" value="70" label="success + small"></snice-slider>
  <snice-slider variant="success" size="medium" value="70" label="success + medium"></snice-slider>
  <snice-slider variant="success" size="large" value="70" label="success + large"></snice-slider>
  <snice-slider variant="warning" size="small" value="60" label="warning + small"></snice-slider>
  <snice-slider variant="warning" size="medium" value="60" label="warning + medium"></snice-slider>
  <snice-slider variant="warning" size="large" value="60" label="warning + large"></snice-slider>
  <snice-slider variant="danger" size="small" value="80" label="danger + small"></snice-slider>
  <snice-slider variant="danger" size="medium" value="80" label="danger + medium"></snice-slider>
  <snice-slider variant="danger" size="large" value="80" label="danger + large"></snice-slider>
</div>

<h2>Boolean States</h2>
<div class="row">
  <snice-slider disabled value="40" label="Disabled"></snice-slider>
  <snice-slider readonly value="60" label="Readonly"></snice-slider>
  <snice-slider loading value="50" label="Loading"></snice-slider>
  <snice-slider required label="Required"></snice-slider>
  <snice-slider invalid value="30" label="Invalid"></snice-slider>
</div>

<h2>Show Value</h2>
<div class="row">
  <snice-slider show-value value="42" label="With value display"></snice-slider>
  <snice-slider show-value value="0" label="Value at 0"></snice-slider>
  <snice-slider show-value value="100" label="Value at 100"></snice-slider>
</div>

<h2>Show Ticks</h2>
<div class="row">
  <snice-slider show-ticks step="10" value="50" label="Ticks (step=10)"></snice-slider>
  <snice-slider show-ticks step="20" value="60" label="Ticks (step=20)"></snice-slider>
  <snice-slider show-ticks step="25" value="75" label="Ticks (step=25)"></snice-slider>
</div>

<h2>Show Ticks + Show Value</h2>
<div class="row">
  <snice-slider show-ticks show-value step="10" value="40" label="Ticks + Value"></snice-slider>
</div>

<h2>Custom Min / Max / Step</h2>
<div class="row">
  <snice-slider min="0" max="10" step="1" value="5" show-value label="0-10, step 1"></snice-slider>
  <snice-slider min="-50" max="50" step="5" value="0" show-value label="-50 to 50, step 5"></snice-slider>
  <snice-slider min="0" max="1" step="0.1" value="0.5" show-value label="0-1, step 0.1"></snice-slider>
</div>

<h2>Helper Text and Error Text</h2>
<div class="row">
  <snice-slider value="60" label="Volume" helper-text="Adjust the playback volume"></snice-slider>
  <snice-slider value="30" label="Brightness" error-text="Value too low for outdoor use" invalid></snice-slider>
</div>

<h2>Vertical Orientation</h2>
<div class="row" style="height: 200px; align-items: flex-end;">
  <snice-slider vertical value="40" label="Vertical" style="height: 180px; width: auto;"></snice-slider>
  <snice-slider vertical variant="primary" value="60" show-value style="height: 180px; width: auto;"></snice-slider>
  <snice-slider vertical variant="success" value="80" show-ticks step="20" style="height: 180px; width: auto;"></snice-slider>
  <snice-slider vertical variant="danger" value="20" disabled style="height: 180px; width: auto;"></snice-slider>
</div>

<h2>Vertical Sizes</h2>
<div class="row" style="height: 200px; align-items: flex-end;">
  <snice-slider vertical size="small" value="50" style="height: 180px; width: auto;"></snice-slider>
  <snice-slider vertical size="medium" value="50" style="height: 180px; width: auto;"></snice-slider>
  <snice-slider vertical size="large" value="50" style="height: 180px; width: auto;"></snice-slider>
</div>

<h2>Edge Cases</h2>
<div class="row">
  <snice-slider value="0" show-value label="Min value (0)"></snice-slider>
  <snice-slider value="100" show-value label="Max value (100)"></snice-slider>
  <snice-slider min="0" max="0" value="0" show-value label="min=max=0"></snice-slider>
  <snice-slider min="50" max="50" value="50" show-value label="min=max=50"></snice-slider>
</div>

<h2>No Label</h2>
<div class="row">
  <snice-slider value="50" variant="primary"></snice-slider>
</div>

<h2>Named (Form Integration)</h2>
<div class="row">
  <snice-slider name="volume" value="75" label="Volume (name=volume)" show-value></snice-slider>
</div>

<script type="module">
  import './snice-slider.ts';
</script>
</body>
</html>
