<!DOCTYPE html>
<html>
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <title>Cropper</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    section { margin-bottom: 2rem; }
    .cropper-box { width: 100%; max-width: 500px; height: 350px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid .cropper-box { height: 250px; }
  </style>
  <script type="module">import './snice-cropper.ts';</script>
</head>
<body>

<section>
  <h2>Default (free form, output-type="png")</h2>
  <div class="cropper-box">
    <snice-cropper src="https://picsum.photos/seed/crop1/600/400" style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

<section>
  <h2>aspect-ratio="1" (square)</h2>
  <div class="cropper-box">
    <snice-cropper src="https://picsum.photos/seed/crop2/600/400" aspect-ratio="1" style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

<section>
  <h2>aspect-ratio="1.777" (16:9)</h2>
  <div class="cropper-box">
    <snice-cropper src="https://picsum.photos/seed/crop3/600/400" aspect-ratio="1.777" style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

<section>
  <h2>aspect-ratio="0.75" (3:4 portrait)</h2>
  <div class="cropper-box">
    <snice-cropper src="https://picsum.photos/seed/crop4/600/400" aspect-ratio="0.75" style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

<section>
  <h2>Aspect ratio grid</h2>
  <div class="grid">
    <div>
      <p style="font-size:0.8rem;color:var(--snice-color-text-secondary)">Free (0)</p>
      <div class="cropper-box">
        <snice-cropper src="https://picsum.photos/seed/cg1/400/300" style="width:100%;height:100%"></snice-cropper>
      </div>
    </div>
    <div>
      <p style="font-size:0.8rem;color:var(--snice-color-text-secondary)">1:1</p>
      <div class="cropper-box">
        <snice-cropper src="https://picsum.photos/seed/cg2/400/300" aspect-ratio="1" style="width:100%;height:100%"></snice-cropper>
      </div>
    </div>
    <div>
      <p style="font-size:0.8rem;color:var(--snice-color-text-secondary)">4:3</p>
      <div class="cropper-box">
        <snice-cropper src="https://picsum.photos/seed/cg3/400/300" aspect-ratio="1.333" style="width:100%;height:100%"></snice-cropper>
      </div>
    </div>
    <div>
      <p style="font-size:0.8rem;color:var(--snice-color-text-secondary)">16:9</p>
      <div class="cropper-box">
        <snice-cropper src="https://picsum.photos/seed/cg4/400/300" aspect-ratio="1.777" style="width:100%;height:100%"></snice-cropper>
      </div>
    </div>
  </div>
</section>

<section>
  <h2>output-type="jpeg"</h2>
  <div class="cropper-box">
    <snice-cropper src="https://picsum.photos/seed/crop5/600/400" output-type="jpeg" style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

<section>
  <h2>output-type="webp"</h2>
  <div class="cropper-box">
    <snice-cropper src="https://picsum.photos/seed/crop6/600/400" output-type="webp" style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

<section>
  <h2>min-width="100" min-height="100"</h2>
  <div class="cropper-box">
    <snice-cropper src="https://picsum.photos/seed/crop7/600/400" min-width="100" min-height="100" style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

<section>
  <h2>No src (empty)</h2>
  <div class="cropper-box">
    <snice-cropper style="width:100%;height:100%"></snice-cropper>
  </div>
</section>

</body>
</html>
