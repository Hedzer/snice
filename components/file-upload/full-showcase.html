<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
    }

    .section {
      margin-bottom: 40px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .upload-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .row > * {
      flex: 1;
    }

    .output {
      margin-top: 20px;
      padding: 10px;
      background: var(--snice-color-background);
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.875rem;
    }

    button {
      padding: 0.5rem 1rem;
      background: var(--snice-color-primary);
      color: white;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
    }

    button:hover {
      background: var(--snice-color-primary-hover);
    }
  </style>
</head>
<body>
  <h1>File Upload Component Demo</h1>

  <div class="section">
    <h2>Basic</h2>
    <div class="upload-group">
      <snice-file-upload label="Default Upload"></snice-file-upload>
      <snice-file-upload label="With Helper Text" helper-text="Select a file to upload"></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>Multiple Files</h2>
    <div class="upload-group">
      <snice-file-upload multiple label="Upload Multiple Files" max-files="5"></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>File Type Restrictions</h2>
    <div class="upload-group">
      <snice-file-upload accept="image/*" label="Images Only" helper-text="PNG, JPG, GIF, etc."></snice-file-upload>
      <snice-file-upload accept=".pdf,.doc,.docx" label="Documents Only" helper-text="PDF, Word documents"></snice-file-upload>
      <snice-file-upload accept="image/*,.pdf" label="Images and PDFs"></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>Size Limits</h2>
    <div class="upload-group">
      <snice-file-upload
        label="Max 2MB"
        max-size="2097152"
        helper-text="Maximum file size: 2MB"
      ></snice-file-upload>
      <snice-file-upload
        label="Max 5MB"
        max-size="5242880"
        helper-text="Maximum file size: 5MB"
      ></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>Sizes</h2>
    <div class="upload-group">
      <snice-file-upload size="small" label="Small"></snice-file-upload>
      <snice-file-upload size="medium" label="Medium"></snice-file-upload>
      <snice-file-upload size="large" label="Large"></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>Variants</h2>
    <div class="upload-group">
      <snice-file-upload variant="outlined" label="Outlined"></snice-file-upload>
      <snice-file-upload variant="filled" label="Filled"></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>Options</h2>
    <div class="upload-group">
      <snice-file-upload drag-drop="false" label="No Drag & Drop"></snice-file-upload>
      <snice-file-upload show-preview="false" label="No Preview" accept="image/*"></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>States</h2>
    <div class="upload-group">
      <snice-file-upload disabled label="Disabled"></snice-file-upload>
      <snice-file-upload required label="Required"></snice-file-upload>
      <snice-file-upload invalid error-text="File is required" label="Error State"></snice-file-upload>
    </div>
  </div>

  <div class="section">
    <h2>Interactive Demo</h2>
    <snice-file-upload
      id="interactive-upload"
      label="Upload Files"
      multiple
      accept="image/*,.pdf"
      max-size="5242880"
      max-files="3"
      helper-text="Max 3 files, 5MB each. Images or PDFs only."
    ></snice-file-upload>

    <div style="margin-top: 20px; display: flex; gap: 10px;">
      <button onclick="clearFiles()">Clear All</button>
      <button onclick="removeFirst()">Remove First</button>
    </div>

    <div class="output" id="output">
      <strong>Selected files:</strong> None
    </div>
  </div>

  <div class="section">
    <h2>Form Integration</h2>
    <form id="demo-form">
      <div class="upload-group">
        <snice-file-upload
          name="documents"
          label="Upload Documents"
          accept=".pdf,.doc,.docx"
          multiple
          required
          helper-text="Select one or more documents"
        ></snice-file-upload>

        <button type="submit">Submit</button>
      </div>
    </form>
    <div class="output" id="form-output"></div>
  </div>

  <script type="module">
    import './snice-file-upload.ts';

    // Interactive demo
    const interactiveUpload = document.getElementById('interactive-upload');
    const output = document.getElementById('output');

    function updateOutput() {
      const files = Array.from(interactiveUpload.files || []);
      if (files.length === 0) {
        output.innerHTML = '<strong>Selected files:</strong> None';
      } else {
        output.innerHTML = `
          <strong>Selected files (${files.length}):</strong><br>
          ${files.map(f => `- ${f.name} (${formatFileSize(f.size)})`).join('<br>')}
        `;
      }
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
    }

    window.clearFiles = () => {
      interactiveUpload.clear();
      updateOutput();
    };

    window.removeFirst = () => {
      interactiveUpload.removeFile(0);
      updateOutput();
    };

    interactiveUpload.addEventListener('file-upload-change', () => {
      updateOutput();
    });

    interactiveUpload.addEventListener('file-upload-error', (e) => {
      alert('Error: ' + e.detail.message);
    });

    // Form demo
    const formOutput = document.getElementById('form-output');
    document.getElementById('demo-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const files = formData.getAll('documents');

      formOutput.innerHTML = `
        <strong>Form submitted with ${files.length} file(s):</strong><br>
        ${Array.from(files).map(f => `- ${f.name} (${formatFileSize(f.size)})`).join('<br>')}
      `;
    });

    // Event logging for all uploads
    document.querySelectorAll('snice-file-upload').forEach(upload => {
      upload.addEventListener('file-upload-change', (e) => {
        console.log('Files changed:', e.detail.files);
      });
      upload.addEventListener('file-upload-error', (e) => {
        console.error('Upload error:', e.detail.message);
      });
    });
  </script>
</body>
</html>
