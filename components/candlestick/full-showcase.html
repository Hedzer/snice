<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>snice-candlestick Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 2rem;
      background: var(--snice-color-background, #f5f5f5);
      color: var(--snice-color-text, #171717);
    }
    h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
    h2 { margin: 2rem 0 1rem; font-size: 1.125rem; }
    .demo-section {
      background: var(--snice-color-background, white);
      border: 1px solid var(--snice-color-border, #e2e2e2);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .controls button {
      padding: 0.5rem 1rem;
      border: 1px solid var(--snice-color-border, #e2e2e2);
      border-radius: 4px;
      background: var(--snice-color-background-element, #fcfbf9);
      color: var(--snice-color-text, #171717);
      cursor: pointer;
      font-size: 0.875rem;
    }
    .controls button:hover {
      background: var(--snice-color-primary, #2563eb);
      color: white;
    }
    snice-candlestick {
      height: 400px;
    }
    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="document.documentElement.toggleAttribute('data-theme'); document.documentElement.getAttribute('data-theme') === '' ? document.documentElement.setAttribute('data-theme', 'dark') : document.documentElement.removeAttribute('data-theme')">Toggle Theme</button>

  <h1>snice-candlestick</h1>

  <h2>Basic Candlestick Chart</h2>
  <div class="demo-section">
    <snice-candlestick id="basic-chart"></snice-candlestick>
  </div>

  <h2>With Volume Bars</h2>
  <div class="demo-section">
    <snice-candlestick id="volume-chart" show-volume></snice-candlestick>
  </div>

  <h2>Custom Colors</h2>
  <div class="demo-section">
    <snice-candlestick id="custom-colors" bullish-color="#0088ff" bearish-color="#ff6600" show-volume></snice-candlestick>
  </div>

  <h2>Currency Format</h2>
  <div class="demo-section">
    <snice-candlestick id="currency-chart" y-axis-format="currency" show-volume></snice-candlestick>
  </div>

  <h2>No Grid, No Crosshair</h2>
  <div class="demo-section">
    <snice-candlestick id="minimal-chart" show-grid="false" show-crosshair="false"></snice-candlestick>
  </div>

  <h2>Interactive Controls</h2>
  <div class="demo-section">
    <div class="controls">
      <button onclick="interactiveChart.resetZoom()">Reset Zoom</button>
      <button onclick="interactiveChart.zoomTo(0, 30)">Zoom to First 30</button>
      <button onclick="interactiveChart.zoomTo(70, 100)">Zoom to Last 30</button>
      <button onclick="addRandomCandle()">Add Candle</button>
    </div>
    <snice-candlestick id="interactive-chart" show-volume zoom-enabled></snice-candlestick>
  </div>

  <script type="module">
    import '../../src/index.ts';
    import '../../components/candlestick/snice-candlestick.ts';

    function generateData(count, startPrice = 150) {
      const data = [];
      let price = startPrice;
      const baseDate = new Date('2024-01-01');

      for (let i = 0; i < count; i++) {
        const change = (Math.random() - 0.48) * 8;
        const open = price;
        const close = price + change;
        const high = Math.max(open, close) + Math.random() * 4;
        const low = Math.min(open, close) - Math.random() * 4;
        const volume = Math.floor(Math.random() * 2000000) + 200000;
        const date = new Date(baseDate);
        date.setDate(baseDate.getDate() + i);

        data.push({
          date: date.toISOString().split('T')[0],
          open: parseFloat(open.toFixed(2)),
          high: parseFloat(high.toFixed(2)),
          low: parseFloat(low.toFixed(2)),
          close: parseFloat(close.toFixed(2)),
          volume
        });
        price = close;
      }
      return data;
    }

    const sampleData = generateData(100);

    // Basic chart
    const basicChart = document.getElementById('basic-chart');
    basicChart.data = sampleData;

    // Volume chart
    const volumeChart = document.getElementById('volume-chart');
    volumeChart.data = sampleData;

    // Custom colors chart
    const customColors = document.getElementById('custom-colors');
    customColors.data = sampleData;

    // Currency chart
    const currencyChart = document.getElementById('currency-chart');
    currencyChart.data = generateData(80, 42500);

    // Minimal chart
    const minimalChart = document.getElementById('minimal-chart');
    minimalChart.data = sampleData;

    // Interactive chart
    const interactiveChart = document.getElementById('interactive-chart');
    window.interactiveChart = interactiveChart;
    interactiveChart.data = generateData(100);

    // Listen for events
    interactiveChart.addEventListener('@snice/candle-click', (e) => {
      console.log('Candle clicked:', e.detail);
    });

    interactiveChart.addEventListener('@snice/candle-hover', (e) => {
      // console.log('Candle hover:', e.detail);
    });

    window.addRandomCandle = () => {
      const data = [...interactiveChart.data];
      const last = data[data.length - 1];
      const change = (Math.random() - 0.48) * 8;
      const open = last.close;
      const close = open + change;
      const high = Math.max(open, close) + Math.random() * 4;
      const low = Math.min(open, close) - Math.random() * 4;
      const lastDate = new Date(last.date);
      lastDate.setDate(lastDate.getDate() + 1);

      data.push({
        date: lastDate.toISOString().split('T')[0],
        open: parseFloat(open.toFixed(2)),
        high: parseFloat(high.toFixed(2)),
        low: parseFloat(low.toFixed(2)),
        close: parseFloat(close.toFixed(2)),
        volume: Math.floor(Math.random() * 2000000) + 200000
      });
      interactiveChart.data = data;
    };
  </script>
</body>
</html>
