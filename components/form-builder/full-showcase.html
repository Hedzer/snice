<!DOCTYPE html>
<html>
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <title>Form Builder</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    snice-form-builder { display: block; min-height: 400px; border: 1px solid var(--snice-color-border, #e2e2e2); border-radius: 8px; margin-bottom: 1.5rem; }
  </style>
  <script type="module">
    import './snice-form-builder.ts';

    document.addEventListener('DOMContentLoaded', () => {
      // Mode: edit (default) - empty
      // (no setup needed, empty schema)

      // Mode: edit with pre-populated schema
      const fb2 = document.getElementById('fb-populated');
      fb2.schema = {
        title: 'Contact Form',
        description: 'Fill in your details below.',
        fields: [
          { id: 'f1', type: 'text', label: 'Full Name', required: true, placeholder: 'Enter your name' },
          { id: 'f2', type: 'email', label: 'Email Address', required: true, helpText: 'We will not share your email.' },
          { id: 'f3', type: 'phone', label: 'Phone Number', placeholder: '(555) 123-4567' },
          { id: 'f4', type: 'select', label: 'Subject', options: [{ label: 'General', value: 'general' }, { label: 'Support', value: 'support' }, { label: 'Sales', value: 'sales' }] },
          { id: 'f5', type: 'paragraph', label: 'Notice', content: 'Please provide accurate information.' },
        ]
      };

      // Mode: preview
      const fb3 = document.getElementById('fb-preview');
      fb3.schema = {
        title: 'Job Application',
        description: 'Apply for the open position.',
        fields: [
          { id: 'f1', type: 'text', label: 'Full Name', required: true },
          { id: 'f2', type: 'email', label: 'Email', required: true },
          { id: 'f3', type: 'date', label: 'Available Start Date' },
          { id: 'f4', type: 'radio', label: 'Employment Type', options: [{ label: 'Full-time', value: 'ft' }, { label: 'Part-time', value: 'pt' }, { label: 'Contract', value: 'c' }] },
          { id: 'f5', type: 'checkbox', label: 'Skills', options: [{ label: 'JavaScript', value: 'js' }, { label: 'Python', value: 'py' }, { label: 'Go', value: 'go' }] },
          { id: 'f6', type: 'file', label: 'Resume', accept: '.pdf,.doc,.docx', required: true },
          { id: 'f7', type: 'signature', label: 'Signature', required: true },
        ]
      };

      // All field types
      const fb4 = document.getElementById('fb-alltypes');
      fb4.schema = {
        title: 'All Field Types',
        fields: [
          { id: 'ft1', type: 'text', label: 'Text Field' },
          { id: 'ft2', type: 'number', label: 'Number Field', min: 0, max: 100 },
          { id: 'ft3', type: 'email', label: 'Email Field' },
          { id: 'ft4', type: 'phone', label: 'Phone Field' },
          { id: 'ft5', type: 'select', label: 'Select Field', options: [{ label: 'A', value: 'a' }, { label: 'B', value: 'b' }] },
          { id: 'ft6', type: 'date', label: 'Date Field' },
          { id: 'ft7', type: 'checkbox', label: 'Checkbox Field', options: [{ label: 'X', value: 'x' }, { label: 'Y', value: 'y' }] },
          { id: 'ft8', type: 'radio', label: 'Radio Field', options: [{ label: 'M', value: 'm' }, { label: 'N', value: 'n' }] },
          { id: 'ft9', type: 'file', label: 'File Field' },
          { id: 'ft10', type: 'signature', label: 'Signature Field' },
          { id: 'ft11', type: 'section', label: 'Section Divider' },
          { id: 'ft12', type: 'paragraph', label: 'Paragraph', content: 'Static descriptive text.' },
        ]
      };

      // Custom field types (subset)
      const fb5 = document.getElementById('fb-subset');
      fb5.fieldTypes = ['text', 'email', 'select', 'date'];

      // Field properties: required, placeholder, helpText, width
      const fb6 = document.getElementById('fb-props');
      fb6.schema = {
        title: 'Field Properties Demo',
        fields: [
          { id: 'p1', type: 'text', label: 'Required Field', required: true },
          { id: 'p2', type: 'text', label: 'With Placeholder', placeholder: 'Type something...' },
          { id: 'p3', type: 'text', label: 'With Help Text', helpText: 'This is helpful information.' },
          { id: 'p4', type: 'text', label: 'Half Width', width: 'half' },
          { id: 'p5', type: 'text', label: 'Another Half', width: 'half' },
          { id: 'p6', type: 'number', label: 'Number with Min/Max', min: 1, max: 100 },
          { id: 'p7', type: 'file', label: 'File with Accept', accept: '.pdf,.jpg' },
        ]
      };
    });
  </script>
</head>
<body>

<h2>Mode: edit (default, empty schema)</h2>
<snice-form-builder id="fb-empty"></snice-form-builder>

<h2>Mode: edit (pre-populated schema)</h2>
<snice-form-builder id="fb-populated" mode="edit"></snice-form-builder>

<h2>Mode: preview</h2>
<snice-form-builder id="fb-preview" mode="preview"></snice-form-builder>

<h2>All Field Types</h2>
<snice-form-builder id="fb-alltypes" mode="edit"></snice-form-builder>

<h2>Custom fieldTypes (subset: text, email, select, date)</h2>
<snice-form-builder id="fb-subset" mode="edit"></snice-form-builder>

<h2>Field Properties: required, placeholder, helpText, width, min/max, accept</h2>
<snice-form-builder id="fb-props" mode="edit"></snice-form-builder>

</body>
</html>
