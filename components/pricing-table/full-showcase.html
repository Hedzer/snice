<!DOCTYPE html>
<html>
<head>
  <title>Pricing Table Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      font-family: var(--snice-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif);
      background: var(--snice-color-background, rgb(255 255 255));
      color: var(--snice-color-text, rgb(23 23 23));
    }
    h2, h3 {
      color: var(--snice-color-text, rgb(23 23 23));
    }
    .demo-section {
      margin-bottom: 4rem;
    }
  </style>
  <script type="module">
    import './snice-pricing-table.ts';

    const plans = [
      {
        name: 'Starter',
        price: 0,
        description: 'Perfect for trying out',
        features: [
          { name: '1 user', included: true },
          { name: '5 projects', included: true },
          { name: '1GB storage', included: true },
          { name: 'Email support', included: true },
          { name: 'API access', included: false },
          { name: 'Custom domain', included: false }
        ],
        cta: 'Get Started Free',
        ctaVariant: 'outline'
      },
      {
        name: 'Professional',
        price: 29,
        annualPrice: 24,
        description: 'For growing teams',
        features: [
          { name: '10 users', included: true },
          { name: 'Unlimited projects', included: true },
          { name: '100GB storage', included: true },
          { name: 'Priority support', included: true },
          { name: 'API access', included: true },
          { name: 'Custom domain', included: false }
        ],
        cta: 'Start Free Trial',
        highlighted: true,
        badge: 'Most Popular'
      },
      {
        name: 'Enterprise',
        price: 99,
        annualPrice: 79,
        description: 'For large organizations',
        currency: '$',
        features: [
          { name: 'Unlimited users', included: true },
          { name: 'Unlimited projects', included: true },
          { name: '1TB storage', included: true },
          { name: '24/7 support', included: true },
          { name: 'API access', included: true },
          { name: 'Custom domain', included: true }
        ],
        cta: 'Contact Sales',
        ctaVariant: 'secondary'
      }
    ];

    document.getElementById('cards-demo').plans = plans;
    document.getElementById('table-demo').plans = plans;

    document.querySelectorAll('snice-pricing-table').forEach(el => {
      el.addEventListener('plan-select', e => {
        console.log('Plan selected:', e.detail);
        alert(`Selected: ${e.detail.plan.name} (${e.detail.billing})`);
      });
    });
  </script>
</head>
<body>
  <h2>Pricing Table Demo</h2>

  <div class="demo-section">
    <h3>Cards Variant (default)</h3>
    <snice-pricing-table id="cards-demo"></snice-pricing-table>
  </div>

  <div class="demo-section">
    <h3>Table Variant</h3>
    <snice-pricing-table id="table-demo" variant="table"></snice-pricing-table>
  </div>
</body>
</html>
