<!DOCTYPE html>
<html>
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <title>Chip</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    section { margin-bottom: 2rem; }
  </style>
  <script type="module">import './snice-chip.ts';</script>
</head>
<body>

<section>
  <h2>All variants</h2>
  <div class="row">
    <snice-chip label="Default" variant="default"></snice-chip>
    <snice-chip label="Primary" variant="primary"></snice-chip>
    <snice-chip label="Success" variant="success"></snice-chip>
    <snice-chip label="Warning" variant="warning"></snice-chip>
    <snice-chip label="Error" variant="error"></snice-chip>
    <snice-chip label="Info" variant="info"></snice-chip>
  </div>
</section>

<section>
  <h2>All variants x Selected</h2>
  <div class="row">
    <snice-chip label="Default" variant="default" selected></snice-chip>
    <snice-chip label="Primary" variant="primary" selected></snice-chip>
    <snice-chip label="Success" variant="success" selected></snice-chip>
    <snice-chip label="Warning" variant="warning" selected></snice-chip>
    <snice-chip label="Error" variant="error" selected></snice-chip>
    <snice-chip label="Info" variant="info" selected></snice-chip>
  </div>
</section>

<section>
  <h2>All sizes</h2>
  <div class="row">
    <snice-chip label="Small" size="small"></snice-chip>
    <snice-chip label="Medium" size="medium"></snice-chip>
    <snice-chip label="Large" size="large"></snice-chip>
  </div>
</section>

<section>
  <h2>Sizes x Variants (primary)</h2>
  <div class="row">
    <snice-chip label="Small Primary" size="small" variant="primary"></snice-chip>
    <snice-chip label="Medium Primary" size="medium" variant="primary"></snice-chip>
    <snice-chip label="Large Primary" size="large" variant="primary"></snice-chip>
  </div>
</section>

<section>
  <h2>Removable</h2>
  <div class="row">
    <snice-chip label="Default" removable></snice-chip>
    <snice-chip label="Primary" variant="primary" removable></snice-chip>
    <snice-chip label="Success" variant="success" removable></snice-chip>
    <snice-chip label="Warning" variant="warning" removable></snice-chip>
    <snice-chip label="Error" variant="error" removable></snice-chip>
    <snice-chip label="Info" variant="info" removable></snice-chip>
  </div>
</section>

<section>
  <h2>Removable x Sizes</h2>
  <div class="row">
    <snice-chip label="Small" size="small" removable></snice-chip>
    <snice-chip label="Medium" size="medium" removable></snice-chip>
    <snice-chip label="Large" size="large" removable></snice-chip>
  </div>
</section>

<section>
  <h2>Disabled</h2>
  <div class="row">
    <snice-chip label="Disabled" disabled></snice-chip>
    <snice-chip label="Disabled Primary" variant="primary" disabled></snice-chip>
    <snice-chip label="Disabled Removable" removable disabled></snice-chip>
    <snice-chip label="Disabled Selected" selected disabled></snice-chip>
  </div>
</section>

<section>
  <h2>Icon property (emoji)</h2>
  <div class="row">
    <snice-chip label="Star" icon="&#11088;"></snice-chip>
    <snice-chip label="Heart" icon="&#10084;&#65039;" variant="error"></snice-chip>
    <snice-chip label="Check" icon="&#10003;" variant="success"></snice-chip>
    <snice-chip label="Warning" icon="&#9888;&#65039;" variant="warning"></snice-chip>
  </div>
</section>

<section>
  <h2>Icon slot (Material Symbols)</h2>
  <div class="row">
    <snice-chip label="Label">
      <span slot="icon" class="material-symbols-outlined" style="font-size:16px">label</span>
    </snice-chip>
    <snice-chip label="Home">
      <span slot="icon" class="material-symbols-outlined" style="font-size:16px">home</span>
    </snice-chip>
  </div>
</section>

<section>
  <h2>Avatar</h2>
  <div class="row">
    <snice-chip label="Alice" avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Alice"></snice-chip>
    <snice-chip label="Bob" avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Bob" removable></snice-chip>
    <snice-chip label="Charlie" avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=Charlie" variant="primary"></snice-chip>
  </div>
</section>

<section>
  <h2>Avatar x Sizes</h2>
  <div class="row">
    <snice-chip label="Small" avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=sm" size="small"></snice-chip>
    <snice-chip label="Medium" avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=md" size="medium"></snice-chip>
    <snice-chip label="Large" avatar="https://api.dicebear.com/7.x/avataaars/svg?seed=lg" size="large"></snice-chip>
  </div>
</section>

<section>
  <h2>Edge: long text</h2>
  <snice-chip label="This is an extremely long chip label that should handle overflow gracefully"></snice-chip>
</section>

<section>
  <h2>Edge: single character</h2>
  <snice-chip label="X"></snice-chip>
</section>

<section>
  <h2>Edge: empty label</h2>
  <snice-chip label=""></snice-chip>
</section>

</body>
</html>
