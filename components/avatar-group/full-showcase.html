<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snice Avatar Group Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px;
      line-height: 1.6;
      background: var(--snice-color-background);
      transition: background-color var(--snice-transition-medium) ease, color var(--snice-transition-medium) ease;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: var(--snice-color-background-element);
      padding: 40px;
      border-radius: 8px;
      box-shadow: var(--snice-shadow-lg);
    }

    h1 {
      color: var(--snice-color-text);
      border-bottom: 2px solid var(--snice-color-border);
      padding-bottom: 10px;
    }

    h2 {
      color: var(--snice-color-text-secondary);
      margin-top: 30px;
    }

    .demo-section {
      margin: 30px 0;
      padding: 20px;
      background: var(--snice-color-background);
      border-radius: 4px;
    }

    .demo-label {
      display: block;
      margin-bottom: 12px;
      font-weight: 500;
      color: var(--snice-color-text-secondary);
      font-size: 14px;
    }

    .inline-demo {
      display: flex;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
      margin: 16px 0;
    }

    .event-log {
      margin-top: 16px;
      padding: 12px;
      background: var(--snice-color-background);
      border: 1px solid var(--snice-color-border);
      border-radius: 4px;
      font-size: 14px;
      font-family: monospace;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Snice Avatar Group Component Demo</h1>

    <div class="demo-section">
      <h2>Basic Avatar Group</h2>
      <snice-avatar-group id="basic-group"></snice-avatar-group>
    </div>

    <div class="demo-section">
      <h2>With Overflow (+N)</h2>
      <span class="demo-label">max="3"</span>
      <snice-avatar-group id="overflow-group" max="3"></snice-avatar-group>
    </div>

    <div class="demo-section">
      <h2>Sizes</h2>
      <div class="inline-demo">
        <div>
          <span class="demo-label">Small</span>
          <snice-avatar-group id="small-group" size="small"></snice-avatar-group>
        </div>
        <div>
          <span class="demo-label">Medium (default)</span>
          <snice-avatar-group id="medium-group" size="medium"></snice-avatar-group>
        </div>
        <div>
          <span class="demo-label">Large</span>
          <snice-avatar-group id="large-group" size="large"></snice-avatar-group>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <h2>Custom Overlap</h2>
      <div class="inline-demo">
        <div>
          <span class="demo-label">overlap="4"</span>
          <snice-avatar-group id="overlap-4" overlap="4"></snice-avatar-group>
        </div>
        <div>
          <span class="demo-label">overlap="12"</span>
          <snice-avatar-group id="overlap-12" overlap="12"></snice-avatar-group>
        </div>
        <div>
          <span class="demo-label">overlap="16"</span>
          <snice-avatar-group id="overlap-16" overlap="16"></snice-avatar-group>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <h2>Events</h2>
      <snice-avatar-group id="event-group" max="3"></snice-avatar-group>
      <div class="event-log" id="event-log">Click an avatar or the overflow indicator...</div>
    </div>
  </div>

  <script type="module">
    import './snice-avatar-group.ts';

    const sampleAvatars = [
      { name: 'Alice Johnson', initials: 'AJ' },
      { name: 'Bob Smith', initials: 'BS' },
      { name: 'Carol Williams', initials: 'CW' },
      { name: 'David Brown', initials: 'DB' },
      { name: 'Eve Davis', initials: 'ED' },
      { name: 'Frank Miller', initials: 'FM' },
      { name: 'Grace Wilson', initials: 'GW' },
    ];

    const threeAvatars = sampleAvatars.slice(0, 3);

    // Basic
    document.getElementById('basic-group').avatars = sampleAvatars.slice(0, 5);

    // Overflow
    document.getElementById('overflow-group').avatars = sampleAvatars;

    // Sizes
    document.getElementById('small-group').avatars = threeAvatars;
    document.getElementById('medium-group').avatars = threeAvatars;
    document.getElementById('large-group').avatars = threeAvatars;

    // Overlap
    document.getElementById('overlap-4').avatars = threeAvatars;
    document.getElementById('overlap-12').avatars = threeAvatars;
    document.getElementById('overlap-16').avatars = threeAvatars;

    // Events
    const eventGroup = document.getElementById('event-group');
    eventGroup.avatars = sampleAvatars;

    const eventLog = document.getElementById('event-log');
    let logEntries = [];

    eventGroup.addEventListener('avatar-click', (e) => {
      const { avatar, index } = e.detail;
      addLogEntry(`Avatar click: "${avatar.name}" (index ${index})`);
    });

    eventGroup.addEventListener('overflow-click', (e) => {
      const { remaining, avatars } = e.detail;
      const names = avatars.map(a => a.name).join(', ');
      addLogEntry(`Overflow click: ${remaining} more (${names})`);
    });

    function addLogEntry(message) {
      const timestamp = new Date().toLocaleTimeString();
      logEntries.unshift(`[${timestamp}] ${message}`);
      logEntries = logEntries.slice(0, 10);
      eventLog.innerHTML = logEntries.join('<br>');
    }
  </script>
</body>
</html>
