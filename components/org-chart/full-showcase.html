<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Org Chart</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .chart-box { border: 1px solid var(--snice-color-border, #e2e2e2); border-radius: 8px; overflow: auto; min-height: 200px; padding: 1.5rem; }
    .chart-box snice-org-chart { display: block; }
  </style>
</head>
<body>

<h2>Direction: top-down (default)</h2>
<div class="chart-box">
  <snice-org-chart id="chart-td"></snice-org-chart>
</div>

<h2>Direction: left-right</h2>
<div class="chart-box">
  <snice-org-chart id="chart-lr" direction="left-right"></snice-org-chart>
</div>

<h2>Compact: false (default)</h2>
<div class="chart-box">
  <snice-org-chart id="chart-normal"></snice-org-chart>
</div>

<h2>Compact: true</h2>
<div class="chart-box">
  <snice-org-chart id="chart-compact" compact></snice-org-chart>
</div>

<h2>Compact + left-right</h2>
<div class="chart-box">
  <snice-org-chart id="chart-compact-lr" direction="left-right" compact></snice-org-chart>
</div>

<h2>With avatars</h2>
<div class="chart-box">
  <snice-org-chart id="chart-avatars"></snice-org-chart>
</div>

<h2>Without avatars (initials)</h2>
<div class="chart-box">
  <snice-org-chart id="chart-initials"></snice-org-chart>
</div>

<h2>Nodes with title</h2>
<div class="chart-box">
  <snice-org-chart id="chart-titles"></snice-org-chart>
</div>

<h2>Nodes without title</h2>
<div class="chart-box">
  <snice-org-chart id="chart-no-titles"></snice-org-chart>
</div>

<h2>Single node (no children)</h2>
<div class="chart-box">
  <snice-org-chart id="chart-single"></snice-org-chart>
</div>

<h2>Deep hierarchy (4 levels)</h2>
<div class="chart-box">
  <snice-org-chart id="chart-deep"></snice-org-chart>
</div>

<h2>Wide hierarchy (many siblings)</h2>
<div class="chart-box">
  <snice-org-chart id="chart-wide"></snice-org-chart>
</div>

<h2>No data</h2>
<div class="chart-box">
  <snice-org-chart id="chart-empty"></snice-org-chart>
</div>

</body>
</html>
