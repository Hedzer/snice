<!DOCTYPE html>
<html>
<head>
  <title>Order Tracker Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      font-family: var(--snice-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif);
      background: var(--snice-color-background, rgb(255 255 255));
      color: var(--snice-color-text, rgb(23 23 23));
    }
    h2, h3 {
      color: var(--snice-color-text, rgb(23 23 23));
    }
    .demo-section {
      margin-bottom: 4rem;
      max-width: 800px;
    }
    .demo-section--vertical {
      max-width: 400px;
    }
  </style>
  <script type="module">
    import './snice-order-tracker.ts';

    // Horizontal tracker - shipped
    const tracker1 = document.getElementById('tracker-shipped');
    tracker1.steps = [
      { label: 'Ordered', status: 'completed', timestamp: 'Feb 20, 2026 9:15 AM', description: 'Order placed successfully' },
      { label: 'Confirmed', status: 'completed', timestamp: 'Feb 20, 2026 9:30 AM' },
      { label: 'Shipped', status: 'active', timestamp: 'Feb 22, 2026 2:00 PM', description: 'Package left the warehouse' },
      { label: 'Out for Delivery', status: 'pending' },
      { label: 'Delivered', status: 'pending' }
    ];

    // Horizontal tracker - delivered
    const tracker2 = document.getElementById('tracker-delivered');
    tracker2.steps = [
      { label: 'Ordered', status: 'completed', timestamp: 'Feb 15, 2026' },
      { label: 'Confirmed', status: 'completed', timestamp: 'Feb 15, 2026' },
      { label: 'Shipped', status: 'completed', timestamp: 'Feb 17, 2026' },
      { label: 'Out for Delivery', status: 'completed', timestamp: 'Feb 19, 2026' },
      { label: 'Delivered', status: 'completed', timestamp: 'Feb 19, 2026', description: 'Left at front door' }
    ];

    // Vertical tracker
    const tracker3 = document.getElementById('tracker-vertical');
    tracker3.steps = [
      { label: 'Order Placed', status: 'completed', timestamp: 'Feb 24, 2026 10:00 AM', description: 'Your order has been received' },
      { label: 'Payment Confirmed', status: 'completed', timestamp: 'Feb 24, 2026 10:05 AM', description: 'Payment processed successfully' },
      { label: 'Preparing Order', status: 'active', timestamp: 'Feb 24, 2026 11:30 AM', description: 'Your items are being packed' },
      { label: 'Ready for Pickup', status: 'pending' },
      { label: 'Picked Up', status: 'pending' }
    ];

    // Event listeners
    document.querySelectorAll('snice-order-tracker').forEach(el => {
      el.addEventListener('step-click', e => {
        console.log('Step clicked:', e.detail);
      });
    });
  </script>
</head>
<body>
  <h2>Order Tracker Demo</h2>

  <div class="demo-section">
    <h3>Horizontal - In Transit</h3>
    <snice-order-tracker
      id="tracker-shipped"
      tracking-number="1Z999AA10123456784"
      carrier="UPS">
    </snice-order-tracker>
  </div>

  <div class="demo-section">
    <h3>Horizontal - Delivered</h3>
    <snice-order-tracker
      id="tracker-delivered"
      tracking-number="9400111899223"
      carrier="USPS">
    </snice-order-tracker>
  </div>

  <div class="demo-section demo-section--vertical">
    <h3>Vertical Variant</h3>
    <snice-order-tracker
      id="tracker-vertical"
      variant="vertical">
    </snice-order-tracker>
  </div>
</body>
</html>
