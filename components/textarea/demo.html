<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textarea Demo</title>
  <style>
    body {
      padding: 40px;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
    }

    .section {
      margin-bottom: 40px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    h3 {
      margin-bottom: 16px;
      font-size: 1.125rem;
      color: #6b7280;
    }

    .textarea-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .row > * {
      flex: 1;
    }
  </style>
</head>
<body>
  <h1>Textarea Component Demo</h1>

  <div class="section">
    <h2>Basic</h2>
    <div class="textarea-group">
      <snice-textarea label="Default Textarea" placeholder="Enter text..."></snice-textarea>
      <snice-textarea label="With Value" value="This is some text"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Variants</h2>
    <div class="textarea-group">
      <snice-textarea variant="outlined" label="Outlined" placeholder="Outlined variant"></snice-textarea>
      <snice-textarea variant="filled" label="Filled" placeholder="Filled variant"></snice-textarea>
      <snice-textarea variant="underlined" label="Underlined" placeholder="Underlined variant"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Sizes</h2>
    <div class="textarea-group">
      <snice-textarea size="small" label="Small" placeholder="Small size"></snice-textarea>
      <snice-textarea size="medium" label="Medium" placeholder="Medium size"></snice-textarea>
      <snice-textarea size="large" label="Large" placeholder="Large size"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Rows</h2>
    <div class="textarea-group">
      <snice-textarea rows="3" label="3 Rows"></snice-textarea>
      <snice-textarea rows="5" label="5 Rows"></snice-textarea>
      <snice-textarea rows="10" label="10 Rows"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Resize Options</h2>
    <div class="textarea-group">
      <snice-textarea resize="none" label="No Resize" placeholder="resize=none"></snice-textarea>
      <snice-textarea resize="vertical" label="Vertical Resize" placeholder="resize=vertical (default)"></snice-textarea>
      <snice-textarea resize="horizontal" label="Horizontal Resize" placeholder="resize=horizontal"></snice-textarea>
      <snice-textarea resize="both" label="Both Directions" placeholder="resize=both"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Auto-grow</h2>
    <div class="textarea-group">
      <snice-textarea auto-grow rows="3" label="Auto-grow" placeholder="Type to expand..." helper-text="Height automatically adjusts to content"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Character Count</h2>
    <div class="textarea-group">
      <snice-textarea maxlength="100" label="Limited to 100 chars" placeholder="Type to see counter..."></snice-textarea>
      <snice-textarea maxlength="500" value="This textarea has a 500 character limit." label="With initial value"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Helper Text</h2>
    <div class="textarea-group">
      <snice-textarea label="With Helper Text" helper-text="This is some helpful information" placeholder="Type here..."></snice-textarea>
      <snice-textarea label="Multiple lines of text" helper-text="Please provide detailed information for better results"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Error State</h2>
    <div class="textarea-group">
      <snice-textarea invalid error-text="This field is required" label="Required Field" placeholder="This field cannot be empty"></snice-textarea>
      <snice-textarea invalid error-text="Must be at least 50 characters" label="Validation Error" value="Too short"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>States</h2>
    <div class="textarea-group">
      <snice-textarea disabled label="Disabled" value="This textarea is disabled"></snice-textarea>
      <snice-textarea readonly label="Readonly" value="This textarea is readonly"></snice-textarea>
      <snice-textarea required label="Required" placeholder="This field is required"></snice-textarea>
    </div>
  </div>

  <div class="section">
    <h2>Loading States</h2>
    <div class="textarea-group">
      <snice-textarea
        loading
        label="Loading Textarea"
        placeholder="Processing..."
        helper-text="Textarea is disabled while loading">
      </snice-textarea>
      <snice-textarea
        loading
        value="Saving your content..."
        label="Loading with Value">
      </snice-textarea>
      <snice-textarea
        id="simulate-loading"
        label="Simulate Loading"
        placeholder="Type something and click the button"
        helper-text="Interactive loading demo">
      </snice-textarea>
      <button id="loading-btn" style="
        padding: 10px 20px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
      ">Trigger Loading (3s)</button>
    </div>
  </div>

  <div class="section">
    <h2>Form Integration</h2>
    <form id="demo-form">
      <div class="textarea-group">
        <snice-textarea
          name="comments"
          label="Comments"
          required
          minlength="10"
          maxlength="500"
          placeholder="Enter your comments (minimum 10 characters)"
          helper-text="Share your thoughts with us"
        ></snice-textarea>
        <button type="submit">Submit</button>
      </div>
    </form>
    <div id="form-output"></div>
  </div>

  <script type="module">
    import './snice-textarea.ts';

    // Loading state example
    const loadingTextarea = document.getElementById('simulate-loading');
    const loadingBtn = document.getElementById('loading-btn');

    loadingBtn.addEventListener('click', () => {
      loadingTextarea.loading = true;
      loadingBtn.disabled = true;
      loadingBtn.textContent = 'Loading...';

      setTimeout(() => {
        loadingTextarea.loading = false;
        loadingBtn.disabled = false;
        loadingBtn.textContent = 'Trigger Loading (3s)';
      }, 3000);
    });

    // Form demo
    document.getElementById('demo-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      document.getElementById('form-output').innerHTML = `
        <strong>Submitted:</strong> ${formData.get('comments')}
      `;
    });

    // Event logging
    document.querySelectorAll('snice-textarea').forEach(textarea => {
      textarea.addEventListener('textarea-input', (e) => {
        console.log('Input:', e.detail.value);
      });
      textarea.addEventListener('textarea-change', (e) => {
        console.log('Change:', e.detail.value);
      });
    });
  </script>
</body>
</html>
