<!DOCTYPE html>
<html>
<head>
  <title>Tree Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      font-family: var(--snice-font-family);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .demo-section {
      padding: 20px;
      background: var(--snice-color-surface);
      border: 1px solid var(--snice-color-border);
      border-radius: var(--snice-border-radius-md);
    }
    h3 {
      margin: 0 0 16px 0;
      font-size: var(--snice-font-size-lg);
    }
    snice-tree {
      max-height: 400px;
    }
  </style>
  <script type="module">
    import './snice-tree.ts';

    const fileSystemData = [
      {
        id: 'root',
        label: 'project',
        icon: '📁',
        expanded: true,
        children: [
          {
            id: 'src',
            label: 'src',
            icon: '📁',
            children: [
              { id: 'index.ts', label: 'index.ts', icon: '📄' },
              { id: 'app.ts', label: 'app.ts', icon: '📄' }
            ]
          },
          { id: 'readme', label: 'README.md', icon: '📄' }
        ]
      }
    ];

    const simpleData = [
      {
        id: 'fruits',
        label: 'Fruits',
        expanded: true,
        children: [
          { id: 'apple', label: 'Apple' },
          { id: 'banana', label: 'Banana' }
        ]
      },
      {
        id: 'vegetables',
        label: 'Vegetables',
        children: [
          { id: 'carrot', label: 'Carrot' }
        ]
      }
    ];

    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('tree1').nodes = fileSystemData;
      document.getElementById('tree2').nodes = simpleData;
    });
  </script>
</head>
<body>
  <h2>Tree Component Demo</h2>

  <div class="grid">
    <div class="demo-section">
      <h3>File System Tree</h3>
      <snice-tree id="tree1"></snice-tree>
    </div>

    <div class="demo-section">
      <h3>Simple Tree</h3>
      <snice-tree id="tree2" show-icons="false"></snice-tree>
    </div>
  </div>
</body>
</html>
