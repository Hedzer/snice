<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty State Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      background: var(--snice-color-background);
      color: var(--snice-color-text);
      transition: background-color var(--snice-transition-medium) ease, color var(--snice-transition-medium) ease;
    }
    .section {
      margin-bottom: 40px;
    }
    h2 {
      margin-bottom: 20px;
    }
    .demo-box {
      border: 2px dashed var(--snice-color-border);
      border-radius: 8px;
      min-height: 200px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Empty State Demo</h1>

  <div class="section">
    <h2>Basic</h2>
    <div class="demo-box">
      <snice-empty-state></snice-empty-state>
    </div>
  </div>

  <div class="section">
    <h2>Common Scenarios</h2>

    <h3>No Search Results</h3>
    <div class="demo-box">
      <snice-empty-state
        icon="🔍"
        title="No results found"
        description="We couldn't find anything matching your search. Try different keywords."
        action-text="Clear Search"
      ></snice-empty-state>
    </div>

    <h3>Empty Inbox</h3>
    <div class="demo-box">
      <snice-empty-state
        icon="📬"
        title="All caught up!"
        description="You have no new messages."
      ></snice-empty-state>
    </div>

    <h3>No Items</h3>
    <div class="demo-box">
      <snice-empty-state
        icon="📦"
        title="No items yet"
        description="Get started by creating your first item."
        action-text="Create Item"
      ></snice-empty-state>
    </div>

    <h3>404 Page</h3>
    <div class="demo-box">
      <snice-empty-state
        icon="🤷"
        title="Page not found"
        description="The page you're looking for doesn't exist or has been moved."
        action-text="Go Home"
        action-href="/"
      ></snice-empty-state>
    </div>
  </div>

  <div class="section">
    <h2>Sizes</h2>

    <h3>Small</h3>
    <div class="demo-box">
      <snice-empty-state
        size="small"
        title="No data"
        description="This is a small empty state"
      ></snice-empty-state>
    </div>

    <h3>Medium (Default)</h3>
    <div class="demo-box">
      <snice-empty-state
        size="medium"
        title="No data"
        description="This is a medium empty state"
      ></snice-empty-state>
    </div>

    <h3>Large</h3>
    <div class="demo-box">
      <snice-empty-state
        size="large"
        title="No data"
        description="This is a large empty state"
      ></snice-empty-state>
    </div>
  </div>

  <div class="section">
    <h2>Different Icons</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
      <div class="demo-box">
        <snice-empty-state icon="📭" title="Empty" size="small"></snice-empty-state>
      </div>
      <div class="demo-box">
        <snice-empty-state icon="🔍" title="Search" size="small"></snice-empty-state>
      </div>
      <div class="demo-box">
        <snice-empty-state icon="📦" title="Orders" size="small"></snice-empty-state>
      </div>
      <div class="demo-box">
        <snice-empty-state icon="💬" title="Messages" size="small"></snice-empty-state>
      </div>
      <div class="demo-box">
        <snice-empty-state icon="⭐" title="Favorites" size="small"></snice-empty-state>
      </div>
      <div class="demo-box">
        <snice-empty-state icon="📝" title="Notes" size="small"></snice-empty-state>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>With Custom Content</h2>
    <div class="demo-box">
      <snice-empty-state
        icon="🎨"
        title="No projects"
        description="You haven't created any projects yet."
      >
        <div style="margin-top: 1rem; display: flex; gap: 10px; justify-content: center;">
          <button style="padding: 0.5rem 1rem; background: var(--snice-color-primary); color: white; border: none; border-radius: 4px; cursor: pointer;">
            Create Project
          </button>
          <button style="padding: 0.5rem 1rem; background: transparent; color: var(--snice-color-primary); border: 1px solid var(--snice-color-primary); border-radius: 4px; cursor: pointer;">
            Import Project
          </button>
        </div>
      </snice-empty-state>
    </div>
  </div>

  <div class="section">
    <h2>Interactive Demo</h2>
    <div class="demo-box">
      <snice-empty-state
        id="interactive"
        icon="🚀"
        title="Ready to start?"
        description="Click the button below to begin your journey."
        action-text="Get Started"
      ></snice-empty-state>
    </div>
    <div id="output" style="padding: 10px; background: var(--snice-color-background); border-radius: 4px; margin-top: 10px;">
      <strong>Status:</strong> Waiting for action...
    </div>
  </div>

  <script type="module">
    import './snice-empty-state.ts';

    // Interactive demo
    const interactive = document.getElementById('interactive');
    const output = document.getElementById('output');

    interactive.addEventListener('empty-state-action', () => {
      output.innerHTML = '<strong>Status:</strong> Action clicked! ✅';
      setTimeout(() => {
        output.innerHTML = '<strong>Status:</strong> Waiting for action...';
      }, 2000);
    });
  </script>
</body>
</html>
