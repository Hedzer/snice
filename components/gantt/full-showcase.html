<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snice Gantt Chart Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px;
      line-height: 1.6;
      background: var(--snice-color-background);
      color: var(--snice-color-text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: var(--snice-color-text);
      border-bottom: 2px solid var(--snice-color-border);
      padding-bottom: 10px;
    }

    h2 {
      color: var(--snice-color-text-secondary);
      margin-top: 40px;
    }

    .demo-section {
      margin: 30px 0;
      padding: 20px;
      background: var(--snice-color-background);
      border-radius: 8px;
      border: 1px solid var(--snice-color-border);
    }

    .demo-label {
      display: block;
      margin-bottom: 16px;
      font-weight: 600;
      color: var(--snice-color-text-secondary);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 16px;
      background: var(--snice-color-primary);
      color: var(--snice-color-text-inverse);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: var(--snice-color-primary-hover);
    }

    .event-log {
      margin-top: 16px;
      padding: 12px;
      background: var(--snice-color-background);
      border: 1px solid var(--snice-color-border);
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      max-height: 120px;
      overflow-y: auto;
      color: var(--snice-color-text-secondary);
    }

    snice-gantt {
      height: 400px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Snice Gantt Chart Component Demo</h1>

    <div class="demo-section">
      <h2>Basic Gantt Chart</h2>
      <span class="demo-label">Project timeline with tasks and progress</span>
      <snice-gantt id="basic-gantt"></snice-gantt>
    </div>

    <div class="demo-section">
      <h2>Grouped Tasks</h2>
      <span class="demo-label">Tasks organized by group with color coding</span>
      <snice-gantt id="grouped-gantt"></snice-gantt>
    </div>

    <div class="demo-section">
      <h2>Interactive Demo</h2>
      <span class="demo-label">Drag bars to move/resize tasks, use zoom controls</span>

      <div class="controls">
        <button onclick="scrollToToday()">Scroll to Today</button>
        <button onclick="addTask()">Add Task</button>
      </div>

      <snice-gantt id="interactive-gantt"></snice-gantt>

      <div class="event-log" id="event-log">Interact with the chart to see events here...</div>
    </div>
  </div>

  <script type="module">
    import './snice-gantt.ts';

    const today = new Date();
    const d = (offset) => {
      const date = new Date(today);
      date.setDate(date.getDate() + offset);
      return date.toISOString().split('T')[0];
    };

    // Basic gantt
    const basicTasks = [
      { id: '1', name: 'Planning', start: d(-14), end: d(-7), progress: 100, color: 'rgb(37 99 235)' },
      { id: '2', name: 'Design', start: d(-10), end: d(-3), progress: 100, color: 'rgb(147 51 234)' },
      { id: '3', name: 'Development', start: d(-5), end: d(10), progress: 45, color: 'rgb(22 163 74)' },
      { id: '4', name: 'Testing', start: d(5), end: d(15), progress: 10, color: 'rgb(234 88 12)' },
      { id: '5', name: 'Deployment', start: d(14), end: d(18), progress: 0, color: 'rgb(220 38 38)' },
    ];
    document.getElementById('basic-gantt').tasks = basicTasks;

    // Grouped gantt
    const groupedTasks = [
      { id: 'b1', name: 'UI Mockups', start: d(-10), end: d(-5), progress: 100, group: 'Design', color: 'rgb(147 51 234)' },
      { id: 'b2', name: 'Style Guide', start: d(-7), end: d(-2), progress: 80, group: 'Design', color: 'rgb(147 51 234)' },
      { id: 'b3', name: 'Frontend', start: d(-3), end: d(8), progress: 50, group: 'Development', color: 'rgb(37 99 235)' },
      { id: 'b4', name: 'Backend API', start: d(-5), end: d(6), progress: 60, group: 'Development', color: 'rgb(37 99 235)' },
      { id: 'b5', name: 'Database', start: d(-8), end: d(-1), progress: 90, group: 'Development', color: 'rgb(37 99 235)' },
      { id: 'b6', name: 'Unit Tests', start: d(3), end: d(12), progress: 20, group: 'QA', color: 'rgb(22 163 74)' },
      { id: 'b7', name: 'Integration Tests', start: d(8), end: d(16), progress: 0, group: 'QA', color: 'rgb(22 163 74)' },
    ];
    document.getElementById('grouped-gantt').tasks = groupedTasks;

    // Interactive gantt
    let interactiveTasks = [
      { id: 'i1', name: 'Research', start: d(-7), end: d(-2), progress: 100, color: 'rgb(14 165 233)' },
      { id: 'i2', name: 'Prototype', start: d(-3), end: d(4), progress: 70, color: 'rgb(147 51 234)' },
      { id: 'i3', name: 'Implementation', start: d(2), end: d(14), progress: 30, color: 'rgb(22 163 74)' },
      { id: 'i4', name: 'Review', start: d(12), end: d(18), progress: 0, color: 'rgb(234 88 12)' },
    ];
    const interactiveGantt = document.getElementById('interactive-gantt');
    interactiveGantt.tasks = interactiveTasks;

    const log = document.getElementById('event-log');
    function logEvent(type, detail) {
      log.textContent = `${type}: ${JSON.stringify(detail, null, 2)}`;
    }

    interactiveGantt.addEventListener('task-click', (e) => {
      logEvent('task-click', { name: e.detail.task.name, progress: e.detail.task.progress });
    });
    interactiveGantt.addEventListener('task-move', (e) => {
      logEvent('task-move', { name: e.detail.task.name, start: e.detail.start, end: e.detail.end });
    });
    interactiveGantt.addEventListener('task-resize', (e) => {
      logEvent('task-resize', { name: e.detail.task.name, start: e.detail.start, end: e.detail.end });
    });

    window.scrollToToday = function() {
      interactiveGantt.scrollToDate(d(0));
    };

    let taskCounter = 5;
    window.addTask = function() {
      interactiveTasks = [...interactiveGantt.tasks, {
        id: `i${taskCounter}`,
        name: `New Task ${taskCounter}`,
        start: d(taskCounter * 3),
        end: d(taskCounter * 3 + 5),
        progress: 0,
        color: 'rgb(161 98 7)',
      }];
      interactiveGantt.tasks = interactiveTasks;
      taskCounter++;
    };
  </script>
</body>
</html>
