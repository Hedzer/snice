<!DOCTYPE html>
<html>
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <title>Gantt</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    snice-gantt { display: block; border: 1px solid var(--snice-color-border, #e2e2e2); border-radius: 8px; margin-bottom: 1.5rem; min-height: 300px; }
  </style>
  <script type="module">
    import './snice-gantt.ts';

    const baseTasks = [
      { id: 't1', name: 'Planning', start: '2026-03-01', end: '2026-03-10', progress: 100 },
      { id: 't2', name: 'Design', start: '2026-03-08', end: '2026-03-20', progress: 75 },
      { id: 't3', name: 'Development', start: '2026-03-18', end: '2026-04-15', progress: 30 },
      { id: 't4', name: 'Testing', start: '2026-04-10', end: '2026-04-25', progress: 0 },
      { id: 't5', name: 'Launch', start: '2026-04-25', end: '2026-04-30', progress: 0 },
    ];

    const coloredTasks = [
      { id: 'c1', name: 'Backend API', start: '2026-03-01', end: '2026-03-20', color: '#2563eb', progress: 60 },
      { id: 'c2', name: 'Frontend UI', start: '2026-03-10', end: '2026-03-30', color: '#9333ea', progress: 40 },
      { id: 'c3', name: 'Database', start: '2026-03-05', end: '2026-03-15', color: '#16a34a', progress: 90 },
      { id: 'c4', name: 'Deployment', start: '2026-03-28', end: '2026-04-05', color: '#ea580c', progress: 0 },
    ];

    const groupedTasks = [
      { id: 'g1', name: 'Requirements', start: '2026-03-01', end: '2026-03-10', group: 'Phase 1', progress: 100 },
      { id: 'g2', name: 'Architecture', start: '2026-03-05', end: '2026-03-15', group: 'Phase 1', progress: 80 },
      { id: 'g3', name: 'Sprint 1', start: '2026-03-15', end: '2026-03-28', group: 'Phase 2', progress: 50 },
      { id: 'g4', name: 'Sprint 2', start: '2026-03-28', end: '2026-04-10', group: 'Phase 2', progress: 10 },
      { id: 'g5', name: 'QA', start: '2026-04-05', end: '2026-04-20', group: 'Phase 3' },
      { id: 'g6', name: 'Release', start: '2026-04-18', end: '2026-04-25', group: 'Phase 3' },
    ];

    const depTasks = [
      { id: 'd1', name: 'Task A', start: '2026-03-01', end: '2026-03-10', dependencies: [] },
      { id: 'd2', name: 'Task B', start: '2026-03-10', end: '2026-03-20', dependencies: ['d1'] },
      { id: 'd3', name: 'Task C', start: '2026-03-20', end: '2026-04-01', dependencies: ['d2'] },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-base]').forEach(el => { el.tasks = baseTasks; });
      document.getElementById('g-colored').tasks = coloredTasks;
      document.getElementById('g-grouped').tasks = groupedTasks;
      document.getElementById('g-deps').tasks = depTasks;
      document.getElementById('g-nodeps').tasks = depTasks;
    });
  </script>
</head>
<body>

<!-- Zoom: day -->
<h2>Zoom: day</h2>
<snice-gantt data-base zoom="day"></snice-gantt>

<!-- Zoom: week (default) -->
<h2>Zoom: week (default)</h2>
<snice-gantt data-base zoom="week"></snice-gantt>

<!-- Zoom: month -->
<h2>Zoom: month</h2>
<snice-gantt data-base zoom="month"></snice-gantt>

<!-- show-dependencies: true (default) -->
<h2>show-dependencies: true (default)</h2>
<snice-gantt id="g-deps" show-dependencies></snice-gantt>

<!-- show-dependencies: false -->
<h2>show-dependencies: false</h2>
<snice-gantt id="g-nodeps" show-dependencies="false"></snice-gantt>

<!-- Task colors -->
<h2>Custom Task Colors</h2>
<snice-gantt id="g-colored" zoom="week"></snice-gantt>

<!-- Task progress -->
<h2>Task Progress (bars show completion)</h2>
<snice-gantt data-base zoom="week"></snice-gantt>

<!-- Grouped tasks -->
<h2>Grouped Tasks</h2>
<snice-gantt id="g-grouped" zoom="week"></snice-gantt>

<!-- Zoom comparison -->
<h2>Same Data at All Zoom Levels</h2>
<snice-gantt data-base zoom="day"></snice-gantt>
<snice-gantt data-base zoom="week"></snice-gantt>
<snice-gantt data-base zoom="month"></snice-gantt>

</body>
</html>
