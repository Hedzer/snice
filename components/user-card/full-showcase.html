<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Card</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); margin: 2rem 0 0.75rem; }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .action-btn { padding: 0.375rem 0.75rem; border: 1px solid var(--snice-color-border); border-radius: 6px; background: var(--snice-color-background); color: var(--snice-color-text); cursor: pointer; font-size: 0.8rem; }
    .action-btn-primary { background: var(--snice-color-primary); color: white; border: none; }
  </style>
</head>
<body>

<h2>Variant: card (default)</h2>
<div class="grid">
  <snice-user-card name="Sarah Johnson" role="Senior Engineer" company="Acme Corp" email="sarah@acme.com" phone="+1 555-0123" location="San Francisco, CA" status="online"></snice-user-card>
</div>

<h2>Variant: horizontal</h2>

</div>

  <snice-user-card name="Very Long Name That Might Overflow The Card Layout Boundary" role="Extremely Long Position Title at a Very Large Corporation With a Lengthy Name" status="online"></snice-user-card>
