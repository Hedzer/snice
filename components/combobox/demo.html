<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combobox Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      font-family: var(--snice-font-family);
      background: var(--snice-color-background);
      color: var(--snice-color-text);
      max-width: 800px;
      margin: 0 auto;
    }
    .section { margin-bottom: 40px; }
    h2 { color: var(--snice-color-text); margin-bottom: 20px; font-size: var(--snice-font-size-2xl); }
    h3 { color: var(--snice-color-text-secondary); margin-bottom: 16px; font-size: var(--snice-font-size-lg); }
    .row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
    .output {
      padding: 10px;
      background: var(--snice-color-background);
      border-radius: var(--snice-border-radius-md);
      font-family: monospace;
      font-size: var(--snice-font-size-sm);
      margin-top: 10px;
    }
    snice-combobox { width: 250px; }
  </style>
</head>
<body>
  <h2>Combobox Component Demo</h2>

  <div class="section">
    <h3>Basic Combobox</h3>
    <div class="row">
      <snice-combobox
        id="basic"
        label="Choose a fruit"
        placeholder="Type or select...">
      </snice-combobox>

      <snice-combobox
        id="preselected"
        label="Pre-selected"
        value="banana">
      </snice-combobox>

      <snice-combobox
        label="Disabled"
        value="apple"
        disabled>
      </snice-combobox>
    </div>
    <div id="basic-output" class="output">Select a fruit...</div>
  </div>

  <div class="section">
    <h3>Sizes</h3>
    <div class="row">
      <snice-combobox size="small" label="Small" placeholder="Small size"></snice-combobox>
      <snice-combobox size="medium" label="Medium (default)" placeholder="Medium size"></snice-combobox>
      <snice-combobox size="large" label="Large" placeholder="Large size"></snice-combobox>
    </div>
  </div>

  <div class="section">
    <h3>Allow Custom Values</h3>
    <snice-combobox
      id="custom"
      label="Type any value"
      placeholder="Type or select..."
      allow-custom>
    </snice-combobox>
    <div id="custom-output" class="output">Custom values allowed</div>
  </div>

  <div class="section">
    <h3>With Icons</h3>
    <snice-combobox
      id="icons"
      label="Select a country"
      placeholder="Type to search...">
    </snice-combobox>
  </div>

  <div class="section">
    <h3>States</h3>
    <div class="row">
      <snice-combobox label="Required" placeholder="This is required" required></snice-combobox>
      <snice-combobox label="Readonly" value="apple" readonly></snice-combobox>
      <snice-combobox label="Outlined variant" variant="outlined" placeholder="Outlined..."></snice-combobox>
    </div>
  </div>

  <div class="section">
    <h3>Programmatic Control</h3>
    <snice-combobox id="programmatic" label="Controlled" placeholder="Select..."></snice-combobox>
    <div class="row" style="margin-top: 16px;">
      <button onclick="document.getElementById('programmatic').open()">Open</button>
      <button onclick="document.getElementById('programmatic').close()">Close</button>
      <button onclick="document.getElementById('programmatic').value = 'cherry'">Set Cherry</button>
      <button onclick="document.getElementById('programmatic').value = ''">Clear</button>
      <button onclick="document.getElementById('programmatic').focus()">Focus</button>
    </div>
  </div>

  <script type="module">
    import './snice-combobox.ts';

    const fruits = [
      { value: 'apple', label: 'Apple' },
      { value: 'banana', label: 'Banana' },
      { value: 'cherry', label: 'Cherry' },
      { value: 'date', label: 'Date' },
      { value: 'elderberry', label: 'Elderberry' },
      { value: 'fig', label: 'Fig' },
      { value: 'grape', label: 'Grape' },
    ];

    const countries = [
      { value: 'us', label: 'United States', icon: 'https://flagcdn.com/w20/us.png' },
      { value: 'uk', label: 'United Kingdom', icon: 'https://flagcdn.com/w20/gb.png' },
      { value: 'ca', label: 'Canada', icon: 'https://flagcdn.com/w20/ca.png' },
      { value: 'au', label: 'Australia', icon: 'https://flagcdn.com/w20/au.png' },
      { value: 'de', label: 'Germany', icon: 'https://flagcdn.com/w20/de.png' },
      { value: 'fr', label: 'France', icon: 'https://flagcdn.com/w20/fr.png' },
      { value: 'jp', label: 'Japan', icon: 'https://flagcdn.com/w20/jp.png' },
    ];

    // Set options on all comboboxes
    document.querySelectorAll('snice-combobox').forEach(cb => {
      if (!cb.id || ['basic', 'preselected', 'custom', 'programmatic'].includes(cb.id)) {
        cb.options = fruits;
      }
    });
    // Size comboboxes
    document.querySelectorAll('.section:nth-child(2) snice-combobox').forEach(cb => {
      cb.options = fruits;
    });
    // States comboboxes
    document.querySelectorAll('.section:nth-child(5) snice-combobox').forEach(cb => {
      cb.options = fruits;
    });

    document.getElementById('icons').options = countries;

    // Events
    document.getElementById('basic').addEventListener('value-change', (e) => {
      const detail = e.detail;
      document.getElementById('basic-output').textContent =
        `Selected: ${detail.value} (label: ${detail.option?.label || 'custom'})`;
    });

    document.getElementById('custom').addEventListener('value-change', (e) => {
      document.getElementById('custom-output').textContent =
        `Value: ${e.detail.value} (from option: ${!!e.detail.option})`;
    });
  </script>
</body>
</html>
