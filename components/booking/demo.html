<!DOCTYPE html>
<html>
<head>
  <title>Booking Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      background: var(--snice-color-background);
      color: var(--snice-color-text, rgb(23 23 23));
      transition: background-color 200ms ease, color 200ms ease;
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    .example {
      margin: 30px 0;
      max-width: 600px;
    }
    .example h3 {
      margin-bottom: 10px;
    }
    button {
      padding: var(--snice-spacing-xs, 0.5rem) var(--snice-spacing-md, 1rem);
      background: var(--snice-color-primary, rgb(37 99 235));
      color: var(--snice-color-text-inverse, rgb(250 250 250));
      border: none;
      border-radius: var(--snice-border-radius-md, 0.25rem);
      cursor: pointer;
      font-size: var(--snice-font-size-sm, 0.875rem);
      font-family: var(--snice-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif);
    }
    .info {
      margin-top: 10px;
      padding: 10px;
      background: var(--snice-color-background-secondary, rgb(250 250 250));
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
  <script type="module">
    import 'snice';
    import './snice-booking.ts';

    document.addEventListener('DOMContentLoaded', () => {
      const booking = document.getElementById('main-booking');

      // Generate available dates (next 30 days, excluding weekends)
      const availableDates = [];
      const slots = [];
      const today = new Date();

      for (let i = 1; i <= 30; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() + i);
        const dayOfWeek = date.getDay();
        if (dayOfWeek !== 0 && dayOfWeek !== 6) {
          const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
          availableDates.push(dateStr);

          // Add time slots for each available date
          const times = ['09:00', '09:30', '10:00', '10:30', '11:00', '14:00', '14:30', '15:00', '15:30', '16:00'];
          times.forEach(time => {
            slots.push({ date: dateStr, time, duration: 30 });
          });
        }
      }

      booking.availableDates = availableDates;
      booking.availableSlots = slots;
      booking.fields = [
        { name: 'name', label: 'Full Name', type: 'text', required: true, placeholder: 'John Doe' },
        { name: 'email', label: 'Email Address', type: 'email', required: true, placeholder: 'john@example.com' },
        { name: 'phone', label: 'Phone Number', type: 'tel', placeholder: '+1 (555) 123-4567' },
        { name: 'notes', label: 'Notes', type: 'textarea', placeholder: 'Any special requests...' },
      ];

      booking.addEventListener('date-select', (e) => {
        document.getElementById('booking-info').textContent = `Date selected: ${e.detail.date}`;
      });

      booking.addEventListener('slot-select', (e) => {
        document.getElementById('booking-info').textContent = `Slot selected: ${e.detail.slot.time} (${e.detail.slot.duration}min)`;
      });

      booking.addEventListener('booking-confirm', (e) => {
        document.getElementById('booking-info').textContent = `Booking confirmed: ${e.detail.booking.date} at ${e.detail.booking.slot.time}`;
      });

      // Inline variant
      const inlineBooking = document.getElementById('inline-booking');
      inlineBooking.availableDates = availableDates;
      inlineBooking.availableSlots = slots;
      inlineBooking.fields = [
        { name: 'name', label: 'Name', type: 'text', required: true },
        { name: 'email', label: 'Email', type: 'email', required: true },
      ];

      // Theme toggle
      document.getElementById('theme-toggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
      });
    });
  </script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle">Toggle Theme</button>
  <h2>Booking Component Demo</h2>

  <div class="example">
    <h3>Stepper Booking</h3>
    <p>Step through date selection, time slot, and confirmation form.</p>
    <snice-booking id="main-booking"></snice-booking>
    <div class="info" id="booking-info">Select a date to start</div>
  </div>

  <div class="example" style="max-width: 900px;">
    <h3>Inline Booking</h3>
    <p>All steps visible at once, side by side.</p>
    <snice-booking id="inline-booking" variant="inline"></snice-booking>
  </div>
</body>
</html>
