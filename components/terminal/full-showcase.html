<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    snice-terminal { height: 250px; border: 1px solid var(--snice-color-border, #e2e2e2); border-radius: 6px; overflow: hidden; }
  </style>
</head>
<body>

<h2>Default</h2>
<snice-terminal id="default-term"></snice-terminal>

<h2>Custom Prompt</h2>
<snice-terminal id="custom-prompt" prompt="user@host:~$ "></snice-terminal>

<h2>Custom CWD</h2>
<snice-terminal id="custom-cwd" cwd="/home/user/projects"></snice-terminal>

<h2>Readonly</h2>
<snice-terminal id="readonly-term" readonly></snice-terminal>

<h2>Show Timestamps</h2>
<snice-terminal id="timestamps" show-timestamps></snice-terminal>

<h2>Custom Max Lines (10)</h2>
<snice-terminal id="max-lines" max-lines="10"></snice-terminal>

<h2>Pre-filled with Output Lines</h2>
<snice-terminal id="prefilled"></snice-terminal>

<h2>All Line Types</h2>
<snice-terminal id="line-types" readonly></snice-terminal>

<h2>With Timestamps + Readonly</h2>
<snice-terminal id="ts-readonly" show-timestamps readonly></snice-terminal>

<h2>Empty Terminal</h2>
<snice-terminal id="empty-term"></snice-terminal>

<h2>Arrow Prompt</h2>
<snice-terminal id="arrow-prompt" prompt="> "></snice-terminal>

<h2>Hash Prompt</h2>
<snice-terminal id="hash-prompt" prompt="# "></snice-terminal>

<script type="module">
  import './snice-terminal.ts';

  // Default: empty, ready to type

  // Custom prompt: pre-fill some output
  const cp = document.getElementById('custom-prompt');
  cp.writeln('Welcome to the terminal', 'info');

  // Custom CWD
  const cwd = document.getElementById('custom-cwd');
  cwd.writeln('Current directory: /home/user/projects', 'info');

  // Readonly with content
  const ro = document.getElementById('readonly-term');
  ro.writeln('$ npm install', 'input');
  ro.writeln('added 150 packages in 3.2s', 'output');
  ro.writeln('$ npm run build', 'input');
  ro.writeln('Build completed successfully.', 'success');

  // Timestamps
  const ts = document.getElementById('timestamps');
  ts.writeln('Server started on port 3000', 'info');
  ts.writeln('GET /api/users 200 12ms', 'output');
  ts.writeln('POST /api/login 401 5ms', 'warning');
  ts.writeln('Database connection error', 'error');

  // Max lines
  const ml = document.getElementById('max-lines');
  for (let i = 1; i <= 15; i++) {
    ml.writeln(`Line ${i} of 15`, 'output');
  }
  ml.writeln('Only the last 10 lines should be visible', 'info');

  // Prefilled
  const pf = document.getElementById('prefilled');
  pf.writeln('$ git status', 'input');
  pf.writeln('On branch main', 'output');
  pf.writeln('Your branch is up to date with \'origin/main\'.', 'output');
  pf.writeln('nothing to commit, working tree clean', 'output');
  pf.writeln('$ git log --oneline -3', 'input');
  pf.writeln('abc1234 feat: add new feature', 'output');
  pf.writeln('def5678 fix: resolve issue', 'output');
  pf.writeln('ghi9012 chore: update deps', 'output');

  // All line types
  const lt = document.getElementById('line-types');
  lt.writeln('This is an input line', 'input');
  lt.writeln('This is an output line', 'output');
  lt.writeln('This is an error line', 'error');
  lt.writeln('This is an info line', 'info');
  lt.writeln('This is a success line', 'success');
  lt.writeln('This is a warning line', 'warning');

  // Timestamps + readonly
  const tr = document.getElementById('ts-readonly');
  tr.writeln('Application started', 'success');
  tr.writeln('Listening on port 8080', 'info');
  tr.writeln('Request: GET /health', 'output');
  tr.writeln('Response: 200 OK', 'output');
  tr.writeln('Warning: Memory usage high', 'warning');
  tr.writeln('Error: Connection refused', 'error');

  // Arrow prompt
  const ap = document.getElementById('arrow-prompt');
  ap.writeln('Using arrow prompt style', 'info');

  // Hash prompt
  const hp = document.getElementById('hash-prompt');
  hp.writeln('Using hash prompt (root style)', 'info');
</script>
</body>
</html>
