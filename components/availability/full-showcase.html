<!DOCTYPE html>
<html>
<head>
  <title>Availability Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      background: var(--snice-color-background);
      color: var(--snice-color-text, rgb(23 23 23));
      transition: background-color 200ms ease, color 200ms ease;
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    .example {
      margin: 30px 0;
    }
    .example h3 {
      margin-bottom: 10px;
    }
    button {
      padding: var(--snice-spacing-xs, 0.5rem) var(--snice-spacing-md, 1rem);
      background: var(--snice-color-primary, rgb(37 99 235));
      color: var(--snice-color-text-inverse, rgb(250 250 250));
      border: none;
      border-radius: var(--snice-border-radius-md, 0.25rem);
      cursor: pointer;
      font-size: var(--snice-font-size-sm, 0.875rem);
      font-family: var(--snice-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif);
    }
    .info {
      margin-top: 10px;
      padding: 10px;
      background: var(--snice-color-background-secondary, rgb(250 250 250));
      border-radius: 4px;
      font-size: 14px;
      white-space: pre-wrap;
    }
  </style>
  <script type="module">
    import 'snice';
    import './snice-availability.ts';

    document.addEventListener('DOMContentLoaded', () => {
      // Basic availability
      const basic = document.getElementById('basic-availability');
      basic.addEventListener('availability-change', (e) => {
        const ranges = e.detail.value;
        const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const text = ranges.map(r => `${dayNames[r.day]}: ${r.start} - ${r.end}`).join('\n');
        document.getElementById('basic-info').textContent = text || 'No availability set';
      });

      // Pre-filled
      const prefilled = document.getElementById('prefilled-availability');
      prefilled.value = [
        { day: 0, start: '09:00', end: '12:00' },
        { day: 0, start: '13:00', end: '17:00' },
        { day: 1, start: '09:00', end: '17:00' },
        { day: 2, start: '10:00', end: '16:00' },
        { day: 3, start: '09:00', end: '17:00' },
        { day: 4, start: '09:00', end: '15:00' },
      ];

      // Business hours (30min, 8-18)
      const bizHours = document.getElementById('biz-availability');

      // Readonly
      const readonlyAvail = document.getElementById('readonly-availability');
      readonlyAvail.value = [
        { day: 0, start: '09:00', end: '17:00' },
        { day: 1, start: '09:00', end: '17:00' },
        { day: 2, start: '09:00', end: '17:00' },
        { day: 3, start: '09:00', end: '17:00' },
        { day: 4, start: '09:00', end: '17:00' },
      ];

      // Programmatic control
      document.getElementById('set-business').addEventListener('click', () => {
        const ctrl = document.getElementById('control-availability');
        ctrl.setAvailability([
          { day: 0, start: '09:00', end: '17:00' },
          { day: 1, start: '09:00', end: '17:00' },
          { day: 2, start: '09:00', end: '17:00' },
          { day: 3, start: '09:00', end: '17:00' },
          { day: 4, start: '09:00', end: '17:00' },
        ]);
      });

      document.getElementById('clear-all').addEventListener('click', () => {
        document.getElementById('control-availability').clear();
      });

      document.getElementById('get-value').addEventListener('click', () => {
        const ranges = document.getElementById('control-availability').getAvailability();
        const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        alert(JSON.stringify(ranges.map(r => `${dayNames[r.day]}: ${r.start}-${r.end}`), null, 2));
      });

      // Theme toggle
      document.getElementById('theme-toggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
      });
    });
  </script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle">Toggle Theme</button>
  <h2>Availability Component Demo</h2>

  <div class="example">
    <h3>Basic Availability</h3>
    <p>Click or drag to toggle time slots on/off. Use presets for quick selection.</p>
    <snice-availability id="basic-availability" start-hour="6" end-hour="22"></snice-availability>
    <div class="info" id="basic-info">No availability set</div>
  </div>

  <div class="example">
    <h3>Pre-filled Availability</h3>
    <snice-availability id="prefilled-availability" start-hour="8" end-hour="18"></snice-availability>
  </div>

  <div class="example">
    <h3>30-Minute Granularity (Business Hours)</h3>
    <snice-availability id="biz-availability" start-hour="8" end-hour="18" granularity="30" format="24h"></snice-availability>
  </div>

  <div class="example">
    <h3>Readonly</h3>
    <snice-availability id="readonly-availability" start-hour="8" end-hour="18" readonly></snice-availability>
  </div>

  <div class="example">
    <h3>Programmatic Control</h3>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
      <button id="set-business">Set Business Hours</button>
      <button id="clear-all">Clear All</button>
      <button id="get-value">Get Value</button>
    </div>
    <snice-availability id="control-availability" start-hour="6" end-hour="22"></snice-availability>
  </div>
</body>
</html>
