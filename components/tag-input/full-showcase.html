<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag Input</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    snice-tag-input { max-width: 400px; }
  </style>
</head>
<body>

<h2>Default (Empty)</h2>
<snice-tag-input placeholder="Add a tag..."></snice-tag-input>

<h2>With Label</h2>
<snice-tag-input label="Skills" placeholder="Add skills..."></snice-tag-input>

<h2>Pre-populated Tags</h2>
<snice-tag-input id="prepop" label="Technologies"></snice-tag-input>

<h2>With Suggestions</h2>
<snice-tag-input id="with-suggestions" label="Programming Languages" placeholder="Type to see suggestions..."></snice-tag-input>

<h2>Max Tags (3)</h2>
<snice-tag-input id="max-tags" label="Max 3 tags" max-tags="3" placeholder="Max 3 tags..."></snice-tag-input>

<h2>Max Tags (1)</h2>
<snice-tag-input id="max-one" label="Max 1 tag" max-tags="1" placeholder="Only one tag..."></snice-tag-input>

<h2>Allow Duplicates</h2>
<snice-tag-input id="allow-dups" label="Duplicates allowed" allow-duplicates placeholder="Duplicates OK..."></snice-tag-input>

<h2>Disabled</h2>
<snice-tag-input id="disabled-input" label="Disabled" disabled></snice-tag-input>

<h2>Readonly</h2>
<snice-tag-input id="readonly-input" label="Readonly" readonly></snice-tag-input>

<h2>Custom Placeholder</h2>
<snice-tag-input placeholder="Enter keywords separated by comma..."></snice-tag-input>

<h2>Named (Form Integration)</h2>
<snice-tag-input name="tags" label="Form tags (name=tags)" placeholder="Add tags..."></snice-tag-input>

<h2>No Label</h2>
<snice-tag-input placeholder="No label tag input..."></snice-tag-input>

<h2>Pre-populated at Max</h2>
<snice-tag-input id="at-max" label="At max (3/3)" max-tags="3"></snice-tag-input>

<h2>With Suggestions + Pre-populated</h2>
<snice-tag-input id="sug-prepop" label="Frameworks" placeholder="Add frameworks..."></snice-tag-input>

<h2>Many Tags</h2>
<snice-tag-input id="many-tags" label="Many tags"></snice-tag-input>

<script type="module">
  import './snice-tag-input.ts';

  // Pre-populated
  document.getElementById('prepop').value = ['JavaScript', 'TypeScript', 'React'];

  // With suggestions
  const ws = document.getElementById('with-suggestions');
  ws.suggestions = ['JavaScript', 'TypeScript', 'Python', 'Go', 'Rust', 'Ruby', 'Java', 'C#', 'C++', 'Swift', 'Kotlin', 'PHP'];

  // Max tags
  document.getElementById('max-tags').value = ['HTML', 'CSS'];

  // Max one
  document.getElementById('max-one').value = [];

  // Allow duplicates
  document.getElementById('allow-dups').value = ['same', 'same'];

  // Disabled
  document.getElementById('disabled-input').value = ['Tag 1', 'Tag 2'];

  // Readonly
  document.getElementById('readonly-input').value = ['Read', 'Only'];

  // At max
  document.getElementById('at-max').value = ['One', 'Two', 'Three'];

  // Suggestions + prepopulated
  const sp = document.getElementById('sug-prepop');
  sp.value = ['React'];
  sp.suggestions = ['React', 'Vue', 'Angular', 'Svelte', 'Solid', 'Preact', 'Next.js', 'Nuxt', 'Remix'];

  // Many tags
  document.getElementById('many-tags').value = [
    'Alpha', 'Bravo', 'Charlie', 'Delta', 'Echo',
    'Foxtrot', 'Golf', 'Hotel', 'India', 'Juliet'
  ];
</script>
</body>
</html>
