<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snice Weather Component Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px;
      line-height: 1.6;
      background: var(--snice-color-background);
      color: var(--snice-color-text);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      color: var(--snice-color-text);
      border-bottom: 2px solid var(--snice-color-border);
      padding-bottom: 10px;
      margin-bottom: 30px;
    }

    h2 {
      color: var(--snice-color-text);
      margin-top: 40px;
      margin-bottom: 20px;
      font-size: 24px;
    }

    .demo-section {
      margin: 30px 0;
      padding: 20px;
      background: var(--snice-color-background);
      border-radius: 8px;
      border: 1px solid var(--snice-color-border);
    }

    .demo-label {
      display: block;
      margin-bottom: 16px;
      font-weight: 600;
      color: var(--snice-color-text-secondary);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    .weather-card {
      padding: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      color: white;
    }

    .weather-card.sunny {
      background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
    }

    .weather-card.cloudy {
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      color: #333;
    }

    .weather-card.rainy {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    snice-weather {
      display: block;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin: 20px 0;
      flex-wrap: wrap;
      padding: 16px;
      background: var(--snice-color-background-secondary);
      border-radius: 6px;
      border: 1px solid var(--snice-color-border);
    }

    .controls button {
      padding: 10px 16px;
      background: var(--snice-color-primary);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .controls button:hover {
      background: var(--snice-color-primary-hover);
    }

    .controls select {
      padding: 8px 12px;
      border: 1px solid var(--snice-color-border);
      border-radius: 4px;
      background: var(--snice-color-background);
      color: var(--snice-color-text);
      font-size: 14px;
    }

    .city-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .city-btn {
      padding: 8px 16px;
      background: var(--snice-color-background);
      border: 1px solid var(--snice-color-border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .city-btn:hover, .city-btn.active {
      background: var(--snice-color-primary);
      color: white;
      border-color: var(--snice-color-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌤️ Snice Weather Component Demo</h1>

    <div class="demo-section">
      <h2>Weather Widget</h2>
      <span class="demo-label">Display current weather and forecast</span>
      
      <div class="weather-card" id="weather-card">
        <snice-weather id="weather-widget"></snice-weather>
      </div>

      <div class="controls" style="margin-top: 20px;">
        <div class="city-selector">
          <button class="city-btn active" data-city="london">London</button>
          <button class="city-btn" data-city="paris">Paris</button>
          <button class="city-btn" data-city="tokyo">Tokyo</button>
          <button class="city-btn" data-city="ny">New York</button>
          <button class="city-btn" data-city="sydney">Sydney</button>
        </div>
        <span style="flex: 1;"></span>
        <select id="unit-select">
          <option value="celsius">Celsius (°C)</option>
          <option value="fahrenheit">Fahrenheit (°F)</option>
        </select>
      </div>
    </div>

    <div class="demo-section">
      <h2>Multiple Locations</h2>
      <span class="demo-label">Different cities, different weather</span>
      
      <div class="weather-grid">
        <div class="weather-card sunny">
          <snice-weather id="weather-la"></snice-weather>
        </div>
        <div class="weather-card cloudy">
          <snice-weather id="weather-london"></snice-weather>
        </div>
        <div class="weather-card rainy">
          <snice-weather id="weather-seattle"></snice-weather>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <h2>Compact Variant</h2>
      <span class="demo-label">Minimal weather display</span>
      
      <div style="display: flex; gap: 16px; flex-wrap: wrap;">
        <snice-weather id="weather-compact" variant="compact"></snice-weather>
      </div>
    </div>
  </div>

  <script type="module">
    import './snice-weather.ts';

    const weatherData = {
      london: {
        temp: 15,
        condition: 'Partly Cloudy',
        humidity: 72,
        wind: 18,
        forecast: [
          { day: 'Mon', high: 16, low: 11, condition: 'Rainy' },
          { day: 'Tue', high: 18, low: 12, condition: 'Cloudy' },
          { day: 'Wed', high: 20, low: 13, condition: 'Sunny' },
          { day: 'Thu', high: 19, low: 12, condition: 'Partly Cloudy' },
          { day: 'Fri', high: 17, low: 11, condition: 'Rainy' }
        ]
      },
      paris: {
        temp: 22,
        condition: 'Sunny',
        humidity: 55,
        wind: 12,
        forecast: [
          { day: 'Mon', high: 24, low: 16, condition: 'Sunny' },
          { day: 'Tue', high: 26, low: 17, condition: 'Sunny' },
          { day: 'Wed', high: 23, low: 15, condition: 'Partly Cloudy' },
          { day: 'Thu', high: 21, low: 14, condition: 'Cloudy' },
          { day: 'Fri', high: 22, low: 15, condition: 'Sunny' }
        ]
      },
      tokyo: {
        temp: 28,
        condition: 'Clear',
        humidity: 65,
        wind: 8,
        forecast: [
          { day: 'Mon', high: 30, low: 24, condition: 'Sunny' },
          { day: 'Tue', high: 31, low: 25, condition: 'Sunny' },
          { day: 'Wed', high: 29, low: 24, condition: 'Partly Cloudy' },
          { day: 'Thu', high: 28, low: 23, condition: 'Rainy' },
          { day: 'Fri', high: 27, low: 22, condition: 'Cloudy' }
        ]
      },
      ny: {
        temp: 18,
        condition: 'Cloudy',
        humidity: 60,
        wind: 22,
        forecast: [
          { day: 'Mon', high: 20, low: 14, condition: 'Cloudy' },
          { day: 'Tue', high: 22, low: 15, condition: 'Partly Cloudy' },
          { day: 'Wed', high: 19, low: 13, condition: 'Rainy' },
          { day: 'Thu', high: 17, low: 12, condition: 'Cloudy' },
          { day: 'Fri', high: 21, low: 14, condition: 'Sunny' }
        ]
      },
      sydney: {
        temp: 25,
        condition: 'Sunny',
        humidity: 58,
        wind: 15,
        forecast: [
          { day: 'Mon', high: 27, low: 20, condition: 'Sunny' },
          { day: 'Tue', high: 28, low: 21, condition: 'Sunny' },
          { day: 'Wed', high: 26, low: 19, condition: 'Partly Cloudy' },
          { day: 'Thu', high: 24, low: 18, condition: 'Cloudy' },
          { day: 'Fri', high: 23, low: 17, condition: 'Rainy' }
        ]
      }
    };

    // Main weather widget
    const mainWidget = document.getElementById('weather-widget');
    mainWidget.data = weatherData.london;

    // City buttons
    document.querySelectorAll('.city-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const city = btn.dataset.city;
        mainWidget.data = weatherData[city];
        
        // Update card styling
        const card = document.getElementById('weather-card');
        card.className = 'weather-card';
        if (city === 'paris' || city === 'sydney') {
          card.classList.add('sunny');
        } else if (city === 'london') {
          card.classList.add('cloudy');
        } else if (city === 'ny') {
          card.classList.add('rainy');
        }
      });
    });

    // Unit selector
    document.getElementById('unit-select').addEventListener('change', (e) => {
      mainWidget.unit = e.target.value;
    });

    // Multiple locations
    document.getElementById('weather-la').data = {
      temp: 28,
      condition: 'Sunny',
      humidity: 45,
      wind: 10
    };

    document.getElementById('weather-london').data = weatherData.london;

    document.getElementById('weather-seattle').data = {
      temp: 14,
      condition: 'Rainy',
      humidity: 85,
      wind: 20
    };

    // Compact variant
    document.getElementById('weather-compact').data = {
      temp: 20,
      condition: 'Partly Cloudy'
    };
  </script>
</body>
</html>
