<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step Input Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
      color: var(--snice-color-text, rgb(23 23 23));
      background: var(--snice-color-background, rgb(255 255 255));
    }
    h1 { font-size: 1.5rem; margin-bottom: 2rem; }
    section { margin-bottom: 2rem; }
    h2 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--snice-color-text-secondary, rgb(82 82 82)); }
    .row { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    label { font-size: 0.875rem; min-width: 5rem; }
  </style>
</head>
<body>
  <h1>Step Input</h1>

  <section>
    <h2>Sizes</h2>
    <div class="row">
      <label>Small</label>
      <snice-step-input size="small" value="3" min="0" max="10"></snice-step-input>
    </div>
    <div class="row">
      <label>Medium</label>
      <snice-step-input size="medium" value="5" min="0" max="10"></snice-step-input>
    </div>
    <div class="row">
      <label>Large</label>
      <snice-step-input size="large" value="7" min="0" max="10"></snice-step-input>
    </div>
  </section>

  <section>
    <h2>With Min/Max and Step</h2>
    <div class="row">
      <label>Quantity</label>
      <snice-step-input min="1" max="99" step="1" value="1"></snice-step-input>
    </div>
    <div class="row">
      <label>Temperature</label>
      <snice-step-input min="60" max="85" step="0.5" value="72"></snice-step-input>
    </div>
  </section>

  <section>
    <h2>Wrap Around</h2>
    <div class="row">
      <label>Month</label>
      <snice-step-input min="1" max="12" value="12" wrap></snice-step-input>
    </div>
  </section>

  <section>
    <h2>States</h2>
    <div class="row">
      <label>Disabled</label>
      <snice-step-input value="5" disabled></snice-step-input>
    </div>
    <div class="row">
      <label>Readonly</label>
      <snice-step-input value="42" readonly></snice-step-input>
    </div>
  </section>

  <section>
    <h2>Events</h2>
    <div class="row">
      <snice-step-input id="event-demo" min="0" max="20" value="10"></snice-step-input>
      <span id="event-output">Value: 10</span>
    </div>
  </section>

  <script type="module">
    import './snice-step-input';

    document.getElementById('event-demo').addEventListener('value-change', (e) => {
      document.getElementById('event-output').textContent = `Value: ${e.detail.value} (was ${e.detail.oldValue})`;
    });
  </script>
</body>
</html>
