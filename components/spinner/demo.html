<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinner Demo</title>
  <style>
    body {
      padding: 40px;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
    }
    .section {
      margin-bottom: 40px;
    }
    h2 {
      margin-bottom: 20px;
    }
    .spinner-group {
      display: flex;
      gap: 30px;
      align-items: center;
      flex-wrap: wrap;
    }
    .spinner-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .spinner-item label {
      font-size: 0.875rem;
      color: #6b7280;
    }
    .demo-box {
      padding: 40px;
      background: #f3f4f6;
      border-radius: 8px;
      text-align: center;
    }
    button {
      padding: 0.5rem 1rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Spinner Component Demo</h1>

  <div class="section">
    <h2>Sizes</h2>
    <div class="spinner-group">
      <div class="spinner-item">
        <snice-spinner size="small"></snice-spinner>
        <label>Small</label>
      </div>
      <div class="spinner-item">
        <snice-spinner size="medium"></snice-spinner>
        <label>Medium</label>
      </div>
      <div class="spinner-item">
        <snice-spinner size="large"></snice-spinner>
        <label>Large</label>
      </div>
      <div class="spinner-item">
        <snice-spinner size="xl"></snice-spinner>
        <label>XL</label>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Colors</h2>
    <div class="spinner-group">
      <div class="spinner-item">
        <snice-spinner color="primary"></snice-spinner>
        <label>Primary</label>
      </div>
      <div class="spinner-item">
        <snice-spinner color="success"></snice-spinner>
        <label>Success</label>
      </div>
      <div class="spinner-item">
        <snice-spinner color="warning"></snice-spinner>
        <label>Warning</label>
      </div>
      <div class="spinner-item">
        <snice-spinner color="error"></snice-spinner>
        <label>Error</label>
      </div>
      <div class="spinner-item">
        <snice-spinner color="info"></snice-spinner>
        <label>Info</label>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>With Labels</h2>
    <div class="spinner-group">
      <div class="spinner-item">
        <snice-spinner label="Loading..."></snice-spinner>
        <label>"Loading..."</label>
      </div>
      <div class="spinner-item">
        <snice-spinner size="large" label="50%"></snice-spinner>
        <label>"50%"</label>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Custom Thickness</h2>
    <div class="spinner-group">
      <div class="spinner-item">
        <snice-spinner thickness="2"></snice-spinner>
        <label>thickness="2"</label>
      </div>
      <div class="spinner-item">
        <snice-spinner thickness="4"></snice-spinner>
        <label>thickness="4"</label>
      </div>
      <div class="spinner-item">
        <snice-spinner thickness="6"></snice-spinner>
        <label>thickness="6"</label>
      </div>
      <div class="spinner-item">
        <snice-spinner thickness="8"></snice-spinner>
        <label>thickness="8"</label>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Combined Variations</h2>
    <div class="spinner-group">
      <snice-spinner size="small" color="primary"></snice-spinner>
      <snice-spinner size="medium" color="success"></snice-spinner>
      <snice-spinner size="large" color="warning"></snice-spinner>
      <snice-spinner size="xl" color="error"></snice-spinner>
    </div>
  </div>

  <div class="section">
    <h2>Loading State Demo</h2>
    <div class="demo-box">
      <snice-spinner size="large" color="primary"></snice-spinner>
      <p style="margin-top: 20px; color: #6b7280;">Loading content, please wait...</p>
    </div>
  </div>

  <div class="section">
    <h2>Button States</h2>
    <div style="display: flex; gap: 10px;">
      <button>
        Normal Button
      </button>
      <button disabled>
        <snice-spinner size="small"></snice-spinner>
        Loading...
      </button>
    </div>
  </div>

  <div class="section">
    <h2>Inline Usage</h2>
    <p style="display: flex; align-items: center; gap: 10px;">
      <snice-spinner size="small"></snice-spinner>
      Processing your request...
    </p>
  </div>

  <script type="module">
    import './snice-spinner.ts';
  </script>
</body>
</html>
