<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  </style>
</head>
<body>

<h2>Sizes</h2>
<div class="row">
  <snice-switch size="small" label="Small"></snice-switch>
  <snice-switch size="medium" label="Medium"></snice-switch>
  <snice-switch size="large" label="Large"></snice-switch>
</div>

<h2>Checked State</h2>
<div class="row">
  <snice-switch label="Unchecked"></snice-switch>
  <snice-switch checked label="Checked"></snice-switch>
</div>

<h2>Sizes x Checked</h2>
<div class="row">
  <snice-switch size="small" label="Small off"></snice-switch>
  <snice-switch size="small" checked label="Small on"></snice-switch>
  <snice-switch size="medium" label="Medium off"></snice-switch>
  <snice-switch size="medium" checked label="Medium on"></snice-switch>
  <snice-switch size="large" label="Large off"></snice-switch>
  <snice-switch size="large" checked label="Large on"></snice-switch>
</div>

<h2>Disabled</h2>
<div class="row">
  <snice-switch disabled label="Disabled off"></snice-switch>
  <snice-switch disabled checked label="Disabled on"></snice-switch>
</div>

<h2>Loading</h2>
<div class="row">
  <snice-switch loading label="Loading off"></snice-switch>
  <snice-switch loading checked label="Loading on"></snice-switch>
</div>

<h2>Required</h2>
<div class="row">
  <snice-switch required label="Required"></snice-switch>
  <snice-switch required checked label="Required (checked)"></snice-switch>
</div>

<h2>Invalid</h2>
<div class="row">
  <snice-switch invalid label="Invalid"></snice-switch>
  <snice-switch invalid checked label="Invalid (checked)"></snice-switch>
</div>

<h2>State Labels (On/Off Text)</h2>
<div class="row">
  <snice-switch label-on="ON" label-off="OFF" label="On/Off labels"></snice-switch>
  <snice-switch label-on="ON" label-off="OFF" checked label="On/Off checked"></snice-switch>
  <snice-switch label-on="Yes" label-off="No" label="Yes/No labels"></snice-switch>
  <snice-switch label-on="I" label-off="O" size="large" label="I/O labels"></snice-switch>
</div>

<h2>No Label</h2>
<div class="row">
  <snice-switch></snice-switch>
  <snice-switch checked></snice-switch>
</div>

<h2>All States Matrix (Size x State)</h2>
<div style="display: grid; grid-template-columns: repeat(4, auto); gap: 0.75rem; align-items: center;">
  <span style="font-size: 0.8rem; color: var(--snice-color-text-secondary);">Normal</span>
  <snice-switch size="small"></snice-switch>
  <snice-switch size="medium"></snice-switch>
  <snice-switch size="large"></snice-switch>

  <span style="font-size: 0.8rem; color: var(--snice-color-text-secondary);">Checked</span>
  <snice-switch size="small" checked></snice-switch>
  <snice-switch size="medium" checked></snice-switch>
  <snice-switch size="large" checked></snice-switch>

  <span style="font-size: 0.8rem; color: var(--snice-color-text-secondary);">Disabled</span>
  <snice-switch size="small" disabled></snice-switch>
  <snice-switch size="medium" disabled></snice-switch>
  <snice-switch size="large" disabled></snice-switch>

  <span style="font-size: 0.8rem; color: var(--snice-color-text-secondary);">Disabled+Checked</span>
  <snice-switch size="small" disabled checked></snice-switch>
  <snice-switch size="medium" disabled checked></snice-switch>
  <snice-switch size="large" disabled checked></snice-switch>

  <span style="font-size: 0.8rem; color: var(--snice-color-text-secondary);">Loading</span>
  <snice-switch size="small" loading></snice-switch>
  <snice-switch size="medium" loading></snice-switch>
  <snice-switch size="large" loading></snice-switch>

  <span style="font-size: 0.8rem; color: var(--snice-color-text-secondary);">Invalid</span>
  <snice-switch size="small" invalid></snice-switch>
  <snice-switch size="medium" invalid></snice-switch>
  <snice-switch size="large" invalid></snice-switch>

  <span style="font-size: 0.8rem; color: var(--snice-color-text-secondary);">Required</span>
  <snice-switch size="small" required label="Req"></snice-switch>
  <snice-switch size="medium" required label="Req"></snice-switch>
  <snice-switch size="large" required label="Req"></snice-switch>
</div>

<h2>Named (Form Integration)</h2>
<div class="row">
  <snice-switch name="notifications" value="enabled" checked label="Notifications (name=notifications)"></snice-switch>
  <snice-switch name="dark-mode" value="on" label="Dark Mode (name=dark-mode)"></snice-switch>
</div>

<script type="module">
  import './snice-switch.ts';
</script>
</body>
</html>
