<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snice Permission Matrix Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      font-family: var(--snice-font-family);
      padding: var(--snice-spacing-2xl);
      line-height: var(--snice-line-height-normal);
      background: var(--snice-color-background);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      color: var(--snice-color-text);
      border-bottom: 2px solid var(--snice-color-border);
      padding-bottom: var(--snice-spacing-xs);
    }

    h2 {
      color: var(--snice-color-text-secondary);
      margin-top: var(--snice-spacing-xl);
    }

    .demo-section {
      margin: var(--snice-spacing-xl) 0;
    }

    .demo-label {
      display: block;
      margin-bottom: var(--snice-spacing-md);
      font-weight: var(--snice-font-weight-medium);
      color: var(--snice-color-text-secondary);
      font-size: var(--snice-font-size-sm);
    }

    button {
      padding: var(--snice-spacing-xs) var(--snice-spacing-md);
      background: var(--snice-color-primary);
      color: var(--snice-color-text-inverse);
      border: none;
      border-radius: var(--snice-border-radius-md);
      cursor: pointer;
      font-size: var(--snice-font-size-sm);
    }

    button:hover {
      opacity: 0.9;
    }

    .controls {
      display: flex;
      gap: var(--snice-spacing-xs);
      margin: var(--snice-spacing-md) 0;
    }

    pre {
      background: var(--snice-color-background-secondary);
      padding: var(--snice-spacing-md);
      border-radius: var(--snice-border-radius-md);
      overflow-x: auto;
      font-size: var(--snice-font-size-sm);
      color: var(--snice-color-text);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Snice Permission Matrix Component Demo</h1>

    <div class="demo-section">
      <h2>Editable Matrix</h2>
      <span class="demo-label">Click checkboxes to toggle permissions</span>
      <snice-permission-matrix id="matrix1"></snice-permission-matrix>

      <div class="controls">
        <button onclick="logMatrix()">Log Matrix</button>
        <button onclick="checkPermission()">Check Admin/Delete</button>
      </div>
      <pre id="output">Click a checkbox or button to see output...</pre>
    </div>

    <div class="demo-section">
      <h2>Read-Only Matrix</h2>
      <span class="demo-label">View-only mode with check/dash indicators</span>
      <snice-permission-matrix id="matrix2" readonly></snice-permission-matrix>
    </div>

    <div class="demo-section">
      <h2>Grouped Permissions</h2>
      <span class="demo-label">Permissions organized by category</span>
      <snice-permission-matrix id="matrix3"></snice-permission-matrix>
    </div>
  </div>

  <script type="module">
    import './snice-permission-matrix.ts';

    // === Editable matrix ===
    const matrix1 = document.getElementById('matrix1');
    matrix1.roles = [
      { id: 'admin', name: 'Administrator', description: 'Full system access' },
      { id: 'editor', name: 'Editor', description: 'Content management' },
      { id: 'viewer', name: 'Viewer', description: 'Read-only access' },
      { id: 'guest', name: 'Guest' }
    ];
    matrix1.permissions = [
      { id: 'create', name: 'Create' },
      { id: 'read', name: 'Read' },
      { id: 'update', name: 'Update' },
      { id: 'delete', name: 'Delete' },
      { id: 'publish', name: 'Publish' },
      { id: 'manage-users', name: 'Manage Users' }
    ];
    matrix1.matrix = {
      admin: ['create', 'read', 'update', 'delete', 'publish', 'manage-users'],
      editor: ['create', 'read', 'update', 'publish'],
      viewer: ['read'],
      guest: ['read']
    };

    // === Read-only matrix ===
    const matrix2 = document.getElementById('matrix2');
    matrix2.roles = [
      { id: 'admin', name: 'Admin' },
      { id: 'moderator', name: 'Moderator' },
      { id: 'user', name: 'User' }
    ];
    matrix2.permissions = [
      { id: 'view', name: 'View' },
      { id: 'comment', name: 'Comment' },
      { id: 'post', name: 'Post' },
      { id: 'ban', name: 'Ban Users' },
      { id: 'settings', name: 'Settings' }
    ];
    matrix2.matrix = {
      admin: ['view', 'comment', 'post', 'ban', 'settings'],
      moderator: ['view', 'comment', 'post', 'ban'],
      user: ['view', 'comment', 'post']
    };

    // === Grouped permissions ===
    const matrix3 = document.getElementById('matrix3');
    matrix3.roles = [
      { id: 'admin', name: 'Admin' },
      { id: 'manager', name: 'Manager' },
      { id: 'employee', name: 'Employee' }
    ];
    matrix3.permissions = [
      { id: 'view-docs', name: 'View', group: 'Documents', description: 'View documents' },
      { id: 'edit-docs', name: 'Edit', group: 'Documents', description: 'Edit documents' },
      { id: 'delete-docs', name: 'Delete', group: 'Documents' },
      { id: 'view-reports', name: 'View', group: 'Reports' },
      { id: 'export-reports', name: 'Export', group: 'Reports' },
      { id: 'manage-team', name: 'Manage', group: 'Team' },
      { id: 'view-team', name: 'View', group: 'Team' }
    ];
    matrix3.matrix = {
      admin: ['view-docs', 'edit-docs', 'delete-docs', 'view-reports', 'export-reports', 'manage-team', 'view-team'],
      manager: ['view-docs', 'edit-docs', 'view-reports', 'export-reports', 'view-team'],
      employee: ['view-docs', 'view-reports', 'view-team']
    };

    // === Event listeners ===
    matrix1.addEventListener('permission-toggle', (e) => {
      document.getElementById('output').textContent =
        `Toggle: ${e.detail.roleId} / ${e.detail.permissionId} = ${e.detail.granted}`;
    });

    matrix1.addEventListener('matrix-change', (e) => {
      console.log('Matrix changed:', e.detail.matrix);
    });

    // === Helper functions ===
    window.logMatrix = function() {
      const m = matrix1.getMatrix();
      document.getElementById('output').textContent = JSON.stringify(m, null, 2);
    };

    window.checkPermission = function() {
      const has = matrix1.hasPermission('admin', 'delete');
      document.getElementById('output').textContent =
        `Admin has 'delete' permission: ${has}`;
    };
  </script>
</body>
</html>
