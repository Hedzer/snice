<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Permission Matrix</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    section { margin-bottom: 2rem; }
    snice-permission-matrix { display: block; }
  </style>
</head>
<body>

<h2>Editable (default)</h2>
<section>
  <snice-permission-matrix id="pm-editable"></snice-permission-matrix>
</section>

<h2>Readonly</h2>
<section>
  <snice-permission-matrix id="pm-readonly" readonly></snice-permission-matrix>
</section>

<h2>Many roles, many permissions</h2>
<section>
  <snice-permission-matrix id="pm-large"></snice-permission-matrix>
</section>

<h2>Single role, single permission</h2>
<section>
  <snice-permission-matrix id="pm-minimal"></snice-permission-matrix>
</section>

<h2>Roles with descriptions</h2>
<section>
  <snice-permission-matrix id="pm-role-desc"></snice-permission-matrix>
</section>

<h2>Permissions with descriptions</h2>
<section>
  <snice-permission-matrix id="pm-perm-desc"></snice-permission-matrix>
</section>

<h2>All permissions granted</h2>
<section>
  <snice-permission-matrix id="pm-all-granted" readonly></snice-permission-matrix>
</section>

<h2>No permissions granted</h2>
<section>
  <snice-permission-matrix id="pm-none-granted" readonly></snice-permission-matrix>
</section>

<h2>Empty (no data)</h2>
<section>
  <snice-permission-matrix id="pm-empty"></snice-permission-matrix>
</section>

<script type="module">
  import './snice-permission-matrix.ts';

  const roles3 = [
    { id: 'admin', name: 'Admin', description: 'Full system access' },
    { id: 'editor', name: 'Editor', description: 'Content management' },
    { id: 'viewer', name: 'Viewer' }
  ];
  const perms4 = [
    { id: 'create', name: 'Create' },
    { id: 'read', name: 'Read' },
    { id: 'update', name: 'Update' },
    { id: 'delete', name: 'Delete' }
  ];
  const matrix3 = {
    admin: ['create', 'read', 'update', 'delete'],
    editor: ['create', 'read', 'update'],
    viewer: ['read']
  };

  // Editable
  const pmEdit = document.getElementById('pm-editable');
  pmEdit.roles = roles3;
  pmEdit.permissions = perms4;
  pmEdit.matrix = matrix3;

  // Readonly
  const pmRo = document.getElementById('pm-readonly');
  pmRo.roles = roles3;
  pmRo.permissions = perms4;
  pmRo.matrix = matrix3;

  // Large
  const pmLarge = document.getElementById('pm-large');
  pmLarge.roles = [
    { id: 'super', name: 'Super Admin' },
    { id: 'admin', name: 'Admin' },
    { id: 'manager', name: 'Manager' },
    { id: 'editor', name: 'Editor' },
    { id: 'author', name: 'Author' },
    { id: 'viewer', name: 'Viewer' },
    { id: 'guest', name: 'Guest' }
  ];
  pmLarge.permissions = [
    { id: 'users.create', name: 'Create Users' },
    { id: 'users.read', name: 'View Users' },
    { id: 'users.update', name: 'Edit Users' },
    { id: 'users.delete', name: 'Delete Users' },
    { id: 'posts.create', name: 'Create Posts' },
    { id: 'posts.read', name: 'View Posts' },
    { id: 'posts.update', name: 'Edit Posts' },
    { id: 'posts.delete', name: 'Delete Posts' },
    { id: 'settings', name: 'Settings' },
    { id: 'billing', name: 'Billing' }
  ];
  pmLarge.matrix = {
    super: ['users.create','users.read','users.update','users.delete','posts.create','posts.read','posts.update','posts.delete','settings','billing'],
    admin: ['users.create','users.read','users.update','posts.create','posts.read','posts.update','posts.delete','settings'],
    manager: ['users.read','posts.create','posts.read','posts.update','posts.delete'],
    editor: ['posts.create','posts.read','posts.update'],
    author: ['posts.create','posts.read'],
    viewer: ['posts.read'],
    guest: []
  };

  // Minimal
  const pmMin = document.getElementById('pm-minimal');
  pmMin.roles = [{ id: 'user', name: 'User' }];
  pmMin.permissions = [{ id: 'access', name: 'Access' }];
  pmMin.matrix = { user: ['access'] };

  // Role descriptions
  const pmRoleDesc = document.getElementById('pm-role-desc');
  pmRoleDesc.roles = [
    { id: 'admin', name: 'Admin', description: 'Full system access, can manage all resources' },
    { id: 'mod', name: 'Moderator', description: 'Can moderate content and users' },
    { id: 'user', name: 'User', description: 'Standard user access' }
  ];
  pmRoleDesc.permissions = perms4;
  pmRoleDesc.matrix = { admin: ['create','read','update','delete'], mod: ['read','update','delete'], user: ['read'] };

  // Permission descriptions
  const pmPermDesc = document.getElementById('pm-perm-desc');
  pmPermDesc.roles = roles3;
  pmPermDesc.permissions = [
    { id: 'create', name: 'Create', description: 'Create new records' },
    { id: 'read', name: 'Read', description: 'View existing records' },
    { id: 'update', name: 'Update', description: 'Modify existing records' },
    { id: 'delete', name: 'Delete', description: 'Permanently remove records' }
  ];
  pmPermDesc.matrix = matrix3;

  // All granted
  const pmAll = document.getElementById('pm-all-granted');
  pmAll.roles = roles3;
  pmAll.permissions = perms4;
  pmAll.matrix = {
    admin: ['create','read','update','delete'],
    editor: ['create','read','update','delete'],
    viewer: ['create','read','update','delete']
  };

  // None granted
  const pmNone = document.getElementById('pm-none-granted');
  pmNone.roles = roles3;
  pmNone.permissions = perms4;
  pmNone.matrix = { admin: [], editor: [], viewer: [] };
</script>
</body>
</html>
