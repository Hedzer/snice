<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Action Bar</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      background: var(--snice-color-background);
      color: var(--snice-color-text);
    }
    section { margin-bottom: 2rem; }
    h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--snice-color-text-tertiary, rgb(136 136 136));
      margin: 0 0 0.75rem;
    }
    .row {
      display: flex;
      align-items: stretch;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .card {
      position: relative;
      width: 15rem;
      height: 10rem;
      background: var(--snice-color-background-element, rgb(252 251 249));
      border: 1px solid var(--snice-color-border, rgb(226 226 226));
      border-radius: var(--snice-border-radius-lg, 0.5rem);
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--snice-color-text-secondary, rgb(82 82 82));
      font-size: 0.875rem;
    }
    .card-wide {
      width: 20rem;
      height: 12rem;
    }
    .card-tall {
      width: 10rem;
      height: 14rem;
    }
    .action-btn {
      background: none;
      border: 1px solid var(--snice-color-border, rgb(226 226 226));
      border-radius: var(--snice-border-radius-md, 0.25rem);
      padding: 0.375rem 0.5rem;
      cursor: pointer;
      font-size: 1rem;
      color: var(--snice-color-text, rgb(23 23 23));
      line-height: 1;
    }
    .action-btn:hover {
      background: var(--snice-color-background, rgb(255 255 255));
    }
  </style>
</head>
<body>

  <section>
    <h2>Default variant (hover to show)</h2>
    <div class="row">
      <div class="card"
           onmouseenter="this.querySelector('snice-action-bar').show()"
           onmouseleave="this.querySelector('snice-action-bar').hide()">
        Hover me
        <snice-action-bar position="bottom">
          <button class="action-btn">Edit</button>
          <button class="action-btn">Copy</button>
          <button class="action-btn">Delete</button>
        </snice-action-bar>
      </div>
    </div>
  </section>

  <section>
    <h2>Pill variant (hover to show)</h2>
    <div class="row">
      <div class="card"
           onmouseenter="this.querySelector('snice-action-bar').show()"
           onmouseleave="this.querySelector('snice-action-bar').hide()">
        Hover me
        <snice-action-bar position="bottom" variant="pill">
          <button class="action-btn">Save</button>
          <button class="action-btn">Share</button>
          <button class="action-btn">Print</button>
        </snice-action-bar>
      </div>
    </div>
  </section>

  <section>
    <h2>All positions (hover to show)</h2>
    <div class="row">
      <div class="card card-wide"
           onmouseenter="this.querySelectorAll('snice-action-bar').forEach(b => b.show())"
           onmouseleave="this.querySelectorAll('snice-action-bar').forEach(b => b.hide())">
        Hover me (all corners)
        <snice-action-bar position="top-left" size="small">
          <button class="action-btn">TL</button>
        </snice-action-bar>
        <snice-action-bar position="top-right" size="small">
          <button class="action-btn">TR</button>
        </snice-action-bar>
        <snice-action-bar position="bottom-left" size="small">
          <button class="action-btn">BL</button>
        </snice-action-bar>
        <snice-action-bar position="bottom-right" size="small">
          <button class="action-btn">BR</button>
        </snice-action-bar>
      </div>
      <div class="card card-wide"
           onmouseenter="this.querySelectorAll('snice-action-bar').forEach(b => b.show())"
           onmouseleave="this.querySelectorAll('snice-action-bar').forEach(b => b.hide())">
        Hover me (edges)
        <snice-action-bar position="top" size="small">
          <button class="action-btn">Top</button>
        </snice-action-bar>
        <snice-action-bar position="bottom" size="small">
          <button class="action-btn">Bottom</button>
        </snice-action-bar>
        <snice-action-bar position="left" size="small">
          <button class="action-btn">L</button>
        </snice-action-bar>
        <snice-action-bar position="right" size="small">
          <button class="action-btn">R</button>
        </snice-action-bar>
      </div>
    </div>
  </section>

  <section>
    <h2>Size: small vs medium</h2>
    <div class="row">
      <div class="card"
           onmouseenter="this.querySelector('snice-action-bar').show()"
           onmouseleave="this.querySelector('snice-action-bar').hide()">
        Small
        <snice-action-bar position="bottom" size="small">
          <button class="action-btn">A</button>
          <button class="action-btn">B</button>
          <button class="action-btn">C</button>
        </snice-action-bar>
      </div>
      <div class="card"
           onmouseenter="this.querySelector('snice-action-bar').show()"
           onmouseleave="this.querySelector('snice-action-bar').hide()">
        Medium
        <snice-action-bar position="bottom" size="medium">
          <button class="action-btn">A</button>
          <button class="action-btn">B</button>
          <button class="action-btn">C</button>
        </snice-action-bar>
      </div>
    </div>
  </section>

  <section>
    <h2>Always visible (no-animation)</h2>
    <div class="row">
      <div class="card">
        Always visible
        <snice-action-bar no-animation position="top-right" size="small">
          <button class="action-btn">Edit</button>
          <button class="action-btn">Delete</button>
        </snice-action-bar>
      </div>
    </div>
  </section>

  <script type="module">
    import './snice-action-bar.ts';
  </script>
</body>
</html>
