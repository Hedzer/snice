<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Button</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  </style>
</head>
<body>

<h2>Variants</h2>
<div class="row" id="variants"></div>

<h2>Sizes</h2>
<div class="row" id="sizes"></div>

<h2>Variant x Size Matrix</h2>
<div style="display: grid; grid-template-columns: repeat(3, auto); gap: 0.75rem; align-items: center;" id="matrix"></div>

<h2>Disabled</h2>
<div class="row" id="disabled"></div>

<h2>With Disabled Actions</h2>
<div class="row" id="disabled-actions"></div>

<h2>Many Actions</h2>
<div class="row" id="many-actions"></div>

<h2>Single Action</h2>
<div class="row" id="single-action"></div>

<h2>No Actions (Empty Menu)</h2>
<div class="row" id="no-actions"></div>

<script type="module">
  import './snice-split-button.ts';

  const baseActions = [
    { label: 'Save as Draft', value: 'draft' },
    { label: 'Save & Close', value: 'save-close' },
    { label: 'Save & New', value: 'save-new' },
  ];

  function sb(props) {
    const el = document.createElement('snice-split-button');
    el.label = props.label || 'Save';
    el.actions = props.actions || baseActions;
    if (props.variant) el.variant = props.variant;
    if (props.size) el.size = props.size;
    if (props.disabled) el.disabled = true;
    return el;
  }

  // Variants
  const variants = document.getElementById('variants');
  ['default', 'primary', 'success', 'danger'].forEach(v => {
    variants.appendChild(sb({ variant: v, label: v.charAt(0).toUpperCase() + v.slice(1) }));
  });

  // Sizes
  const sizes = document.getElementById('sizes');
  ['small', 'medium', 'large'].forEach(s => {
    sizes.appendChild(sb({ size: s, variant: 'primary', label: s.charAt(0).toUpperCase() + s.slice(1) }));
  });

  // Matrix
  const matrix = document.getElementById('matrix');
  ['default', 'primary', 'success', 'danger'].forEach(v => {
    ['small', 'medium', 'large'].forEach(s => {
      matrix.appendChild(sb({ variant: v, size: s, label: `${v} ${s}` }));
    });
  });

  // Disabled
  const disabled = document.getElementById('disabled');
  ['default', 'primary', 'success', 'danger'].forEach(v => {
    disabled.appendChild(sb({ variant: v, disabled: true, label: `${v} disabled` }));
  });

  // Disabled actions
  const disabledActions = document.getElementById('disabled-actions');
  disabledActions.appendChild(sb({
    variant: 'primary',
    label: 'Publish',
    actions: [
      { label: 'Publish Now', value: 'now' },
      { label: 'Schedule', value: 'schedule', disabled: true },
      { label: 'Preview', value: 'preview' },
      { label: 'Delete', value: 'delete', disabled: true },
    ]
  }));

  // Many actions
  const manyActions = document.getElementById('many-actions');
  manyActions.appendChild(sb({
    variant: 'primary',
    label: 'Export',
    actions: [
      { label: 'Export as CSV', value: 'csv' },
      { label: 'Export as JSON', value: 'json' },
      { label: 'Export as XML', value: 'xml' },
      { label: 'Export as PDF', value: 'pdf' },
      { label: 'Export as Excel', value: 'xlsx' },
      { label: 'Print', value: 'print' },
    ]
  }));

  // Single action
  const singleAction = document.getElementById('single-action');
  singleAction.appendChild(sb({
    variant: 'success',
    label: 'Deploy',
    actions: [{ label: 'Deploy to Staging', value: 'staging' }]
  }));

  // No actions
  const noActions = document.getElementById('no-actions');
  noActions.appendChild(sb({ variant: 'default', label: 'No Actions', actions: [] }));
</script>
</body>
</html>
