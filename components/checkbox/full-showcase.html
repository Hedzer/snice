<!DOCTYPE html>
<html>
<head>
<script>
document.documentElement.setAttribute('data-theme', localStorage.getItem('snice-theme') || 'dark');
(function(){
  var p = localStorage.getItem('snice-theme-preset');
  var c = localStorage.getItem('snice-theme-custom');
  if (p) { var s = document.createElement('style'); s.id = 'snice-theme-preset'; s.textContent = p; document.head.appendChild(s); }
  if (c) { var s = document.createElement('style'); s.id = 'snice-theme-custom'; s.textContent = c; document.head.appendChild(s); }
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'snice-theme') document.documentElement.setAttribute('data-theme', e.data.theme);
  });
})();
</script>
  <title>Checkbox</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { font-family: system-ui; padding: 1.5rem; background: var(--snice-color-background); color: var(--snice-color-text); }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--snice-color-text-tertiary, #888); }
    .row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    section { margin-bottom: 2rem; }
  </style>
  <script type="module">import './snice-checkbox.ts';</script>
</head>
<body>

<section>
  <h2>Default (unchecked)</h2>
  <snice-checkbox label="Unchecked"></snice-checkbox>
</section>

<section>
  <h2>Checked</h2>
  <snice-checkbox label="Checked" checked></snice-checkbox>
</section>

<section>
  <h2>Indeterminate</h2>
  <snice-checkbox label="Indeterminate" indeterminate></snice-checkbox>
</section>

<section>
  <h2>Sizes</h2>
  <div class="row">
    <snice-checkbox label="Small" size="small"></snice-checkbox>
    <snice-checkbox label="Medium" size="medium"></snice-checkbox>
    <snice-checkbox label="Large" size="large"></snice-checkbox>
  </div>
</section>

<section>
  <h2>Sizes x Checked</h2>
  <div class="row">
    <snice-checkbox label="Small" size="small" checked></snice-checkbox>
    <snice-checkbox label="Medium" size="medium" checked></snice-checkbox>
    <snice-checkbox label="Large" size="large" checked></snice-checkbox>
  </div>
</section>

<section>
  <h2>Sizes x Indeterminate</h2>
  <div class="row">
    <snice-checkbox label="Small" size="small" indeterminate></snice-checkbox>
    <snice-checkbox label="Medium" size="medium" indeterminate></snice-checkbox>
    <snice-checkbox label="Large" size="large" indeterminate></snice-checkbox>
  </div>
</section>

<section>
  <h2>Disabled</h2>
  <div class="row">
    <snice-checkbox label="Disabled unchecked" disabled></snice-checkbox>
    <snice-checkbox label="Disabled checked" disabled checked></snice-checkbox>
    <snice-checkbox label="Disabled indeterminate" disabled indeterminate></snice-checkbox>
  </div>
</section>

<section>
  <h2>Loading</h2>
  <div class="row">
    <snice-checkbox label="Loading" loading></snice-checkbox>
    <snice-checkbox label="Loading checked" loading checked></snice-checkbox>
  </div>
</section>

<section>
  <h2>Loading x Sizes</h2>
  <div class="row">
    <snice-checkbox label="Small" size="small" loading></snice-checkbox>
    <snice-checkbox label="Medium" size="medium" loading></snice-checkbox>
    <snice-checkbox label="Large" size="large" loading></snice-checkbox>
  </div>
</section>

<section>
  <h2>Required</h2>
  <snice-checkbox label="Required field" required></snice-checkbox>
</section>

<section>
  <h2>Invalid</h2>
  <div class="row">
    <snice-checkbox label="Invalid unchecked" invalid></snice-checkbox>
    <snice-checkbox label="Invalid checked" invalid checked></snice-checkbox>
  </div>
</section>

<section>
  <h2>Required + Invalid</h2>
  <snice-checkbox label="Required and invalid" required invalid></snice-checkbox>
</section>

<section>
  <h2>No label</h2>
  <div class="row">
    <snice-checkbox></snice-checkbox>
    <snice-checkbox checked></snice-checkbox>
    <snice-checkbox indeterminate></snice-checkbox>
    <snice-checkbox disabled></snice-checkbox>
  </div>
</section>

<section>
  <h2>Long label</h2>
  <snice-checkbox label="I agree to the terms and conditions, privacy policy, cookie policy, and acknowledge that this is a very long label that should wrap properly in the checkbox layout"></snice-checkbox>
</section>

<section>
  <h2>Single character label</h2>
  <snice-checkbox label="X"></snice-checkbox>
</section>

<section>
  <h2>Form: name + value</h2>
  <snice-checkbox label="Subscribe" name="newsletter" value="yes"></snice-checkbox>
</section>

</body>
</html>
