<!DOCTYPE html>
<html>
<head>
  <title>Network Graph Component Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      margin: 0;
      background: var(--snice-color-background);
      color: var(--snice-color-text);
      transition: background-color var(--snice-transition-medium) ease, color var(--snice-transition-medium) ease;
    }
    .demo-section {
      margin-bottom: 60px;
    }
    .demo-section h3 {
      margin-bottom: 20px;
    }
    .controls {
      margin: 20px 0;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      background: var(--snice-color-primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      opacity: 0.9;
    }
    snice-network-graph {
      height: 500px;
      margin-bottom: 20px;
    }
    .event-log {
      font-family: monospace;
      font-size: 12px;
      background: var(--snice-color-background-element);
      border: 1px solid var(--snice-color-border);
      border-radius: 4px;
      padding: 12px;
      max-height: 120px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <h2>Network Graph Component</h2>

  <!-- Force-directed layout -->
  <div class="demo-section">
    <h3>Force-Directed Layout</h3>
    <snice-network-graph id="force-graph"></snice-network-graph>
    <div class="controls">
      <button onclick="toggleTheme()">Toggle Theme</button>
      <button onclick="randomizeData()">Randomize</button>
    </div>
    <div id="event-log" class="event-log">Events will appear here...</div>
  </div>

  <!-- Circular layout -->
  <div class="demo-section">
    <h3>Circular Layout</h3>
    <snice-network-graph id="circular-graph" layout="circular" show-labels></snice-network-graph>
  </div>

  <!-- Grid layout -->
  <div class="demo-section">
    <h3>Grid Layout</h3>
    <snice-network-graph id="grid-graph" layout="grid" show-labels></snice-network-graph>
  </div>

  <!-- Custom colors and weights -->
  <div class="demo-section">
    <h3>Custom Colors and Weights</h3>
    <snice-network-graph id="custom-graph" show-labels></snice-network-graph>
  </div>

  <script type="module">
    import './snice-network-graph';

    const socialNetwork = {
      nodes: [
        { id: 'alice', label: 'Alice', group: 'engineering' },
        { id: 'bob', label: 'Bob', group: 'engineering' },
        { id: 'carol', label: 'Carol', group: 'design' },
        { id: 'dave', label: 'Dave', group: 'design' },
        { id: 'eve', label: 'Eve', group: 'product' },
        { id: 'frank', label: 'Frank', group: 'engineering' },
        { id: 'grace', label: 'Grace', group: 'product' },
        { id: 'heidi', label: 'Heidi', group: 'design' },
      ],
      edges: [
        { source: 'alice', target: 'bob', label: 'works with' },
        { source: 'alice', target: 'carol' },
        { source: 'bob', target: 'frank' },
        { source: 'carol', target: 'dave' },
        { source: 'dave', target: 'heidi' },
        { source: 'eve', target: 'alice' },
        { source: 'eve', target: 'grace' },
        { source: 'frank', target: 'grace' },
        { source: 'bob', target: 'eve' },
        { source: 'heidi', target: 'grace' },
      ],
    };

    // Force graph
    const forceGraph = document.getElementById('force-graph');
    forceGraph.data = socialNetwork;

    const log = document.getElementById('event-log');
    function logEvent(text) {
      const line = document.createElement('div');
      line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
      log.prepend(line);
    }

    forceGraph.addEventListener('@snice/node-click', (e) => {
      logEvent(`Node clicked: ${e.detail.node.label || e.detail.node.id}`);
    });
    forceGraph.addEventListener('@snice/edge-click', (e) => {
      logEvent(`Edge clicked: ${e.detail.edge.source} → ${e.detail.edge.target}`);
    });
    forceGraph.addEventListener('@snice/node-drag', (e) => {
      logEvent(`Node dragged: ${e.detail.node.label || e.detail.node.id} to (${Math.round(e.detail.x)}, ${Math.round(e.detail.y)})`);
    });

    // Circular graph
    document.getElementById('circular-graph').data = socialNetwork;

    // Grid graph
    document.getElementById('grid-graph').data = socialNetwork;

    // Custom graph
    document.getElementById('custom-graph').data = {
      nodes: [
        { id: 'server', label: 'Server', size: 20, color: 'rgb(220 38 38)' },
        { id: 'db', label: 'Database', size: 18, color: 'rgb(37 99 235)' },
        { id: 'cache', label: 'Cache', size: 14, color: 'rgb(234 88 12)' },
        { id: 'client1', label: 'Client 1', size: 10, color: 'rgb(22 163 74)' },
        { id: 'client2', label: 'Client 2', size: 10, color: 'rgb(22 163 74)' },
        { id: 'client3', label: 'Client 3', size: 10, color: 'rgb(22 163 74)' },
      ],
      edges: [
        { source: 'client1', target: 'server', weight: 2 },
        { source: 'client2', target: 'server', weight: 2 },
        { source: 'client3', target: 'server', weight: 2 },
        { source: 'server', target: 'db', label: 'queries', weight: 4, color: 'rgb(37 99 235)' },
        { source: 'server', target: 'cache', label: 'reads', weight: 3, color: 'rgb(234 88 12)' },
        { source: 'cache', target: 'db', label: 'misses', weight: 1 },
      ],
    };

    // Theme toggle
    window.toggleTheme = () => {
      const html = document.documentElement;
      html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    };

    // Randomize data
    window.randomizeData = () => {
      const count = 6 + Math.floor(Math.random() * 8);
      const groups = ['alpha', 'beta', 'gamma'];
      const nodes = Array.from({ length: count }, (_, i) => ({
        id: `n${i}`,
        label: `Node ${i}`,
        group: groups[i % groups.length],
      }));
      const edges = [];
      for (let i = 1; i < count; i++) {
        edges.push({
          source: `n${Math.floor(Math.random() * i)}`,
          target: `n${i}`,
        });
      }
      // Add some random extra edges
      for (let i = 0; i < Math.floor(count / 2); i++) {
        const a = Math.floor(Math.random() * count);
        const b = Math.floor(Math.random() * count);
        if (a !== b) {
          edges.push({ source: `n${a}`, target: `n${b}` });
        }
      }
      forceGraph.data = { nodes, edges };
    };
  </script>
</body>
</html>
