<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snice KPI Demo</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px;
      line-height: 1.6;
      background: #f5f5f5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      padding-bottom: 10px;
    }

    h2 {
      color: #555;
      margin-top: 30px;
    }

    .demo-section {
      margin: 30px 0;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .demo-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Snice KPI Demo</h1>
    <p>Key Performance Indicator component for dashboards and analytics.</p>

    <div class="demo-section">
      <h2>Basic KPIs</h2>
      <div class="demo-grid">
        <snice-kpi
          id="revenue"
          label="Total Revenue"
          value="$45,231">
        </snice-kpi>

        <snice-kpi
          id="users"
          label="Active Users"
          value="2,345">
        </snice-kpi>

        <snice-kpi
          id="conversions"
          label="Conversion Rate"
          value="3.24%">
        </snice-kpi>
      </div>
    </div>

    <div class="demo-section">
      <h2>With Trend Indicators</h2>
      <div class="demo-grid">
        <snice-kpi
          id="revenue-up"
          label="Monthly Revenue"
          value="$54,239"
          trend-value="+12.5%"
          sentiment="up">
        </snice-kpi>

        <snice-kpi
          id="churn-down"
          label="Churn Rate"
          value="2.3%"
          trend-value="-0.8%"
          sentiment="down">
        </snice-kpi>

        <snice-kpi
          id="satisfaction"
          label="Satisfaction"
          value="4.5/5"
          trend-value="No change"
          sentiment="neutral">
        </snice-kpi>
      </div>
    </div>

    <div class="demo-section">
      <h2>With Sparklines</h2>
      <div class="demo-grid">
        <snice-kpi
          id="sales-spark"
          label="Weekly Sales"
          value="$28,450"
          trend-value="+15.3%"
          sentiment="up">
        </snice-kpi>

        <snice-kpi
          id="traffic-spark"
          label="Page Views"
          value="145,234"
          trend-value="+8.2%"
          sentiment="up">
        </snice-kpi>

        <snice-kpi
          id="errors-spark"
          label="Error Rate"
          value="0.12%"
          trend-value="-2.1%"
          sentiment="down">
        </snice-kpi>
      </div>
    </div>

    <div class="demo-section">
      <h2>Sizes</h2>
      <div class="demo-row">
        <snice-kpi
          id="small-kpi"
          label="Small"
          value="1,234"
          trend-value="+5%"
          sentiment="up"
          size="small">
        </snice-kpi>

        <snice-kpi
          id="medium-kpi"
          label="Medium"
          value="5,678"
          trend-value="+10%"
          sentiment="up"
          size="medium">
        </snice-kpi>

        <snice-kpi
          id="large-kpi"
          label="Large"
          value="9,012"
          trend-value="+15%"
          sentiment="up"
          size="large">
        </snice-kpi>
      </div>
    </div>

    <div class="demo-section">
      <h2>Sentiment Colors</h2>
      <div class="demo-grid">
        <snice-kpi
          id="positive"
          label="Profit Margin"
          value="34.2%"
          trend-value="+3.5%"
          sentiment="up">
        </snice-kpi>

        <snice-kpi
          id="negative"
          label="Cost per Lead"
          value="$45.20"
          trend-value="+12%"
          sentiment="down">
        </snice-kpi>

        <snice-kpi
          id="stable"
          label="Market Share"
          value="28.5%"
          trend-value="±0%"
          sentiment="neutral">
        </snice-kpi>
      </div>
    </div>

    <div class="demo-section">
      <h2>Complex Examples</h2>
      <div class="demo-grid">
        <snice-kpi
          id="mrr"
          label="Monthly Recurring Revenue"
          value="$127,450"
          trend-value="+22.4%"
          sentiment="up">
        </snice-kpi>

        <snice-kpi
          id="ltv"
          label="Customer Lifetime Value"
          value="$1,245"
          trend-value="+8.7%"
          sentiment="up">
        </snice-kpi>

        <snice-kpi
          id="cac"
          label="Customer Acquisition Cost"
          value="$156"
          trend-value="-5.2%"
          sentiment="down">
        </snice-kpi>

        <snice-kpi
          id="nps"
          label="Net Promoter Score"
          value="72"
          trend-value="+4 pts"
          sentiment="up">
        </snice-kpi>
      </div>
    </div>
  </div>

  <script type="module">
    import './snice-kpi.ts';

    // Generate trend data for sparklines
    function generateTrendData(count, direction) {
      const data = [];
      let value = 50;
      for (let i = 0; i < count; i++) {
        value += (direction === 'up' ? 1 : -1) * (Math.random() * 10);
        value = Math.max(10, Math.min(90, value));
        data.push(value);
      }
      return data;
    }

    function volatileData(count) {
      const data = [];
      let value = 50;
      for (let i = 0; i < count; i++) {
        value += (Math.random() - 0.5) * 20;
        value = Math.max(20, Math.min(80, value));
        data.push(value);
      }
      return data;
    }

    // Add sparkline data
    document.getElementById('sales-spark').trendData = generateTrendData(14, 'up');
    document.getElementById('traffic-spark').trendData = generateTrendData(30, 'up');
    document.getElementById('errors-spark').trendData = generateTrendData(24, 'down');

    document.getElementById('small-kpi').trendData = generateTrendData(10, 'up');
    document.getElementById('medium-kpi').trendData = generateTrendData(10, 'up');
    document.getElementById('large-kpi').trendData = generateTrendData(10, 'up');

    document.getElementById('positive').trendData = generateTrendData(15, 'up');
    document.getElementById('negative').trendData = generateTrendData(15, 'up');
    document.getElementById('stable').trendData = volatileData(15);

    document.getElementById('mrr').trendData = generateTrendData(30, 'up');
    document.getElementById('ltv').trendData = generateTrendData(20, 'up');
    document.getElementById('cac').trendData = generateTrendData(20, 'down');
    document.getElementById('nps').trendData = generateTrendData(12, 'up');
  </script>
</body>
</html>
