<!DOCTYPE html>
<html>
<head>
  <title>Stat Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body { padding: 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
  </style>
  <script type="module">
    import 'snice';
    import './snice-stat.ts';
  </script>
</head>
<body>
  <h2>Stat Component Demo</h2>

  <div class="grid">
    <snice-stat label="Total Revenue" value="$45,231" change="+12%" trend="up" icon="💰"></snice-stat>
    <snice-stat label="Active Users" value="2,345" change="-5%" trend="down" icon="👥"></snice-stat>
    <snice-stat label="Conversion Rate" value="3.24%" change="+0.5%" trend="up" icon="📈"></snice-stat>
    <snice-stat label="Avg. Session" value="4m 32s" change="0%" trend="neutral" icon="⏱️"></snice-stat>
  </div>

  <h3>Colored Values</h3>
  <div class="grid">
    <snice-stat label="Sales" value="$12,345" change="+25%" trend="up" color-value></snice-stat>
    <snice-stat label="Errors" value="127" change="+15" trend="down" color-value></snice-stat>
  </div>

  <h3>Sizes</h3>
  <div class="grid">
    <snice-stat label="Small" value="123" size="small"></snice-stat>
    <snice-stat label="Medium" value="456" size="medium"></snice-stat>
    <snice-stat label="Large" value="789" size="large"></snice-stat>
  </div>
</body>
</html>
