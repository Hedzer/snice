<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segmented Control Demo</title>
  <link rel="stylesheet" href="../theme/theme.css">
  <style>
    body {
      padding: 40px;
      font-family: var(--snice-font-family);
      background: var(--snice-color-background);
      color: var(--snice-color-text);
      max-width: 800px;
      margin: 0 auto;
    }
    .section { margin-bottom: 40px; }
    h2 { color: var(--snice-color-text); margin-bottom: 20px; font-size: var(--snice-font-size-2xl); }
    h3 { color: var(--snice-color-text-secondary); margin-bottom: 16px; font-size: var(--snice-font-size-lg); }
    .row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
    .output {
      padding: 10px;
      background: var(--snice-color-background);
      border-radius: var(--snice-border-radius-md);
      font-family: monospace;
      font-size: var(--snice-font-size-sm);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>Segmented Control Demo</h2>

  <div class="section">
    <h3>Basic</h3>
    <snice-segmented-control id="basic"></snice-segmented-control>
    <div id="basic-output" class="output">Selected: day</div>
  </div>

  <div class="section">
    <h3>Sizes</h3>
    <div class="row">
      <snice-segmented-control id="size-small" size="small"></snice-segmented-control>
      <snice-segmented-control id="size-medium" size="medium"></snice-segmented-control>
      <snice-segmented-control id="size-large" size="large"></snice-segmented-control>
    </div>
  </div>

  <div class="section">
    <h3>With Disabled Option</h3>
    <snice-segmented-control id="with-disabled"></snice-segmented-control>
  </div>

  <div class="section">
    <h3>Disabled Control</h3>
    <snice-segmented-control id="disabled" disabled></snice-segmented-control>
  </div>

  <div class="section">
    <h3>View Switcher Example</h3>
    <snice-segmented-control id="view-switcher"></snice-segmented-control>
    <div id="view-output" class="output" style="margin-top: 16px; min-height: 80px;">
      Showing Grid view
    </div>
  </div>

  <script type="module">
    import './snice-segmented-control.ts';

    const viewPeriod = [
      { value: 'day', label: 'Day' },
      { value: 'week', label: 'Week' },
      { value: 'month', label: 'Month' },
      { value: 'year', label: 'Year' },
    ];

    const withDisabled = [
      { value: 'free', label: 'Free' },
      { value: 'pro', label: 'Pro' },
      { value: 'enterprise', label: 'Enterprise', disabled: true },
    ];

    const viewOptions = [
      { value: 'grid', label: 'Grid' },
      { value: 'list', label: 'List' },
      { value: 'table', label: 'Table' },
    ];

    // Set options
    document.getElementById('basic').options = viewPeriod;
    document.getElementById('size-small').options = viewPeriod;
    document.getElementById('size-medium').options = viewPeriod;
    document.getElementById('size-large').options = viewPeriod;
    document.getElementById('with-disabled').options = withDisabled;
    document.getElementById('disabled').options = viewPeriod;
    document.getElementById('view-switcher').options = viewOptions;

    // Events
    document.getElementById('basic').addEventListener('value-change', (e) => {
      document.getElementById('basic-output').textContent = `Selected: ${e.detail.value}`;
    });

    document.getElementById('view-switcher').addEventListener('value-change', (e) => {
      const viewName = e.detail.option.label;
      document.getElementById('view-output').textContent = `Showing ${viewName} view`;
    });
  </script>
</body>
</html>
