<!DOCTYPE html>
<html>
<head>
  <title>Manual Badge Test</title>
</head>
<body>
  <h1>Manual Badge Test</h1>
  <div id="test-container"></div>
  <pre id="log"></pre>

  <script type="module">
    import { INITIALIZED, PROPERTIES_INITIALIZED, RENDER_METHOD } from './src/symbols.js';
    import './components/badge/snice-badge.js';

    const log = document.getElementById('log');
    function addLog(msg) {
      log.textContent += msg + '\n';
      console.log(msg);
    }

    async function test() {
      addLog('Creating badge element...');
      const badge = document.createElement('snice-badge');
      document.getElementById('test-container').appendChild(badge);

      addLog('Waiting for ready...');
      await badge.ready;

      addLog('\n===== BEFORE setting content =====');
      addLog('INITIALIZED: ' + badge[INITIALIZED]);
      addLog('PROPERTIES_INITIALIZED: ' + badge[PROPERTIES_INITIALIZED]);
      addLog('RENDER_METHOD: ' + !!badge[RENDER_METHOD]);
      addLog('content value: "' + badge.content + '"');
      addLog('shadowRoot.innerHTML:\n' + badge.shadowRoot.innerHTML);

      addLog('\n===== Setting content to "New" =====');
      badge.content = 'New';

      addLog('\n===== AFTER setting content =====');
      addLog('content value: "' + badge.content + '"');
      addLog('getAttribute: ' + badge.getAttribute('content'));
      addLog('shadowRoot.innerHTML:\n' + badge.shadowRoot.innerHTML);

      addLog('\n===== Checking for .badge element =====');
      const badgeEl = badge.shadowRoot.querySelector('.badge');
      addLog('.badge element: ' + badgeEl);
    }

    test().catch(err => addLog('ERROR: ' + err));
  </script>
</body>
</html>
