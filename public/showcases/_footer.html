          let sorted;
          if (mode === 'alpha') {
            sorted = [...allSections].sort((a, b) => a.name.localeCompare(b.name));
          } else {
            const idx = {};
            POPULAR_ORDER.forEach((n, i) => idx[n] = i);
            sorted = [...allSections].sort((a, b) => (idx[a.name] ?? 999) - (idx[b.name] ?? 999));
          }
          sorted.forEach(s => {
            if (currentFilter && !currentFilter.has(s.id)) return;
            html += '<a href="#' + s.id + '">' + s.name + '</a>';
            observed.push(s.el);
          });
        }

        // Only replace links, not the controls (preserves search focus)
        linksWrap.innerHTML = html;

        // Re-setup scroll observer
        if (scrollObserver) scrollObserver.disconnect();
        const links = linksWrap.querySelectorAll('a[href^="#"]');
        scrollObserver = new IntersectionObserver(entries => {
          for (const entry of entries) {
            if (entry.isIntersecting) {
              links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + entry.target.id));
            }
          }
        }, { rootMargin: '-80px 0px -70% 0px' });
        observed.forEach(s => scrollObserver.observe(s));
      }

      function reorderDOM(mode) {
        if (mode === 'category') {
          // Show categories, but hide empty ones when filtering
          let order = 0;
          categories.forEach(cat => {
            const hasVisible = !currentFilter || cat.sections.some(s => currentFilter.has(s.id));
            cat.el.style.display = hasVisible ? '' : 'none';
            cat.el.style.order = order++;
            cat.sections.forEach(s => { s.el.style.order = order++; });
          });
        } else {
          let sorted;
          if (mode === 'alpha') {
            sorted = [...allSections].sort((a, b) => a.name.localeCompare(b.name));
          } else {
            const idx = {};
            POPULAR_ORDER.forEach((n, i) => idx[n] = i);
            sorted = [...allSections].sort((a, b) => (idx[a.name] ?? 999) - (idx[b.name] ?? 999));
          }
          sorted.forEach((s, i) => { s.el.style.order = i; });
        }
      }

      function applySort(mode) {
        currentSort = mode;
        reorderDOM(mode);
        // Re-apply filter visibility after reorder
        if (currentFilter) {
          allSections.forEach(s => {
            s.el.style.display = currentFilter.has(s.id) ? '' : 'none';
          });
        }
        buildSidebar(mode);
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === mode));
      }

      // Use pre-rendered DOM elements from _head.html
      const searchDiv = document.getElementById('comp-search');
      const searchInput = document.getElementById('comp-search-input');
      const searchClear = document.getElementById('comp-search-clear');
      const searchCount = document.getElementById('comp-search-count');
      const sortDiv = document.getElementById('sort-controls');

      let searchDebounce;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        const val = searchInput.value.trim();
        searchDiv.classList.toggle('has-value', val.length > 0);
        searchDebounce = setTimeout(() => applyFilter(val || null), 120);
      });
      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchDiv.classList.remove('has-value');
        applyFilter(null);
        searchInput.focus();
      });

      // Init with alphabetical sort
      applySort('alpha');

      // Focus search on load (desktop only)
      if (window.innerWidth >= 1100) searchInput.focus();

      // Sort button click handlers
      sortDiv.addEventListener('click', e => {
        const btn = e.target.closest('.sort-btn');
        if (!btn || btn.classList.contains('active')) return;
        applySort(btn.dataset.sort);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // Keyboard shortcut: / to focus search
      document.addEventListener('keydown', e => {
        if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement !== searchInput && !document.activeElement.closest('[contenteditable]') && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
          e.preventDefault();
          searchInput.focus();
        }
        if (e.key === 'Escape' && document.activeElement === searchInput) {
          searchInput.value = '';
          searchDiv.classList.remove('has-value');
          applyFilter(null);
          searchInput.blur();
        }
      });
    })();

    // Help drawer logic
    (function() {
      const overlay = document.getElementById('help-overlay');
      const drawer = document.getElementById('help-drawer');
      const body = document.getElementById('help-drawer-body');
      const title = document.getElementById('help-drawer-title');
      const closeBtn = document.getElementById('help-drawer-close');
      const cache = {};

      function openDrawer() { overlay.style.display = ''; drawer.style.visibility = ''; drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
      function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = ''; }

      closeBtn.addEventListener('click', closeDrawer);
      overlay.addEventListener('click', closeDrawer);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

      async function fetchDoc(slug) {
        if (cache[slug]) return cache[slug];
        // Try the slug directly first
        const candidates = DOC_SLUGS[slug] ? DOC_SLUGS[slug] : [slug];
        let combined = '';
        for (const name of candidates) {
          try {
            const res = await fetch('docs/components/' + name + '.md');
            if (res.ok) combined += (combined ? '\n\n---\n\n' : '') + await res.text();
          } catch(e) {}
        }
        if (!combined) {
          // Try ai docs as fallback
          for (const name of candidates) {
            try {
              const res = await fetch('docs/ai/components/' + name + '.md');
              if (res.ok) combined += (combined ? '\n\n---\n\n' : '') + await res.text();
            } catch(e) {}
          }
        }
        cache[slug] = combined || null;
        return cache[slug];
      }

      document.addEventListener('click', async e => {
        const btn = e.target.closest('.help-link');
        if (!btn) return;
        e.preventDefault();
        const slug = btn.dataset.slug;
        const name = btn.dataset.name;
        title.textContent = name;
        body.innerHTML = '<p style="opacity:0.5">Loading...</p>';
        openDrawer();
        const md = await fetchDoc(slug);
        if (md) {
          body.innerHTML = mdToHtml(md);
        } else {
          body.innerHTML = '<p style="opacity:0.5">No documentation available yet for this component.</p>';
        }
      });
    })();
    }); // DOMContentLoaded
  </script>
  <style>
    /* Help docs link */
    .help-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--snice-color-primary, #3b82f6);
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      margin-top: 0.15rem;
    }
    .help-link:hover {
      text-decoration: underline;
    }
    .help-link svg {
      opacity: 0.8;
    }

    /* Help drawer overlay */
    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      display: none;
    }
    .help-overlay.open {
      display: block;
      opacity: 1;
      pointer-events: auto;
    }

    /* Help drawer panel */
    .help-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(50%, 90vw);
      background: var(--snice-color-background, #1a1a2e);
      border-left: 1px solid var(--snice-color-border, rgba(128,128,128,0.2));
      z-index: 9999;
      transform: translateX(100%);
      transition: transform 0.25s ease, visibility 0s 0.25s;
      display: flex;
      flex-direction: column;
      visibility: hidden;
    }
    .help-drawer.open {
      transform: translateX(0);
      visibility: visible;
      transition: transform 0.25s ease, visibility 0s 0s;
      box-shadow: -4px 0 24px rgba(0,0,0,0.2);
    }
    .help-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--snice-color-border, rgba(128,128,128,0.2));
      flex-shrink: 0;
    }
    .help-drawer-header h3 {
      margin: 0;
      font-size: 1.1rem;
    }
    .help-drawer-close {
      background: none;
      border: none;
      color: var(--snice-color-text, #eee);
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.6;
      padding: 0 0.25rem;
      line-height: 1;
    }
    .help-drawer-close:hover { opacity: 1; }

    /* Help drawer content */
    .help-drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--snice-color-text, #ddd);
    }
    .help-drawer-body h2 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid var(--snice-color-border, rgba(128,128,128,0.2)); padding-bottom: 0.25rem; }
    .help-drawer-body h3 { font-size: 1rem; margin: 1.25rem 0 0.4rem; }
    .help-drawer-body h4 { font-size: 0.9rem; margin: 1rem 0 0.3rem; }
    .help-drawer-body p { margin: 0.4rem 0; }
    .help-drawer-body code { background: rgba(128,128,128,0.15); padding: 0.15em 0.35em; border-radius: 3px; font-size: 0.8rem; }
    .help-drawer-body pre { background: var(--snice-color-background-tertiary, #2a2a3e); padding: 0.75rem 1rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
    .help-drawer-body pre code { background: none; padding: 0; font-size: 0.78rem; }
    .help-drawer-body table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.8rem; }
    .help-drawer-body th, .help-drawer-body td { text-align: left; padding: 0.35rem 0.5rem; border: 1px solid var(--snice-color-border, rgba(128,128,128,0.2)); }
    .help-drawer-body th { background: rgba(128,128,128,0.1); font-weight: 600; }
    .help-drawer-body ul { padding-left: 1.25rem; margin: 0.4rem 0; }
    .help-drawer-body li { margin: 0.15rem 0; }
    .help-drawer-body a { color: var(--snice-color-primary, #3b82f6); }
    .help-drawer-body hr { border: none; border-top: 1px solid var(--snice-color-border, rgba(128,128,128,0.2)); margin: 1.5rem 0; }
  </style>
</body>
</html>
