  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

  <script>
    // Dynamic component count
    document.getElementById('comp-count').textContent = document.querySelectorAll('.comp-section > h3').length;
    // Re-run Prism highlighting after all scripts load
    if (typeof Prism !== 'undefined') Prism.highlightAll();

    // Doc slug mapping for edge cases
    const DOC_SLUGS = {
      'checkbox-radio-switch': ['checkbox', 'radio', 'switch'],
      'progress-spinner': ['progress', 'spinner'],
      'chart-sparkline': ['chart', 'sparkline'],
      'draw-paint': ['draw', 'paint'],
    };

    // Minimal markdown to HTML
    function mdToHtml(md) {
      let html = '';
      const lines = md.split('\n');
      let inCode = false, codeLang = '', codeLines = [];
      let inTable = false, tableRows = [];
      let inList = false, listItems = [];

      function flushList() {
        if (inList) { html += '<ul>' + listItems.join('') + '</ul>'; listItems = []; inList = false; }
      }
      function flushTable() {
        if (inTable && tableRows.length) {
          html += '<table><thead><tr>' + tableRows[0] + '</tr></thead><tbody>';
          for (let i = 2; i < tableRows.length; i++) html += '<tr>' + tableRows[i] + '</tr>';
          html += '</tbody></table>';
          tableRows = []; inTable = false;
        }
      }
      function inline(t) {
        return t
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      }

      for (const line of lines) {
        if (inCode) {
          if (line.startsWith('```')) { html += '<pre><code class="language-' + codeLang + '">' + codeLines.join('\n').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</code></pre>'; inCode = false; codeLines = []; }
          else codeLines.push(line);
          continue;
        }
        if (line.startsWith('```')) { flushList(); flushTable(); codeLang = line.slice(3).trim() || 'text'; inCode = true; continue; }
        if (line.startsWith('|')) {
          flushList();
          const cells = line.split('|').slice(1, -1).map(c => c.trim());
          if (cells.every(c => /^[-:]+$/.test(c))) { inTable = true; tableRows.push(tableRows[tableRows.length-1] || ''); continue; }
          const tag = !inTable ? 'th' : 'td';
          if (!inTable && tableRows.length === 0) inTable = false;
          tableRows.push(cells.map(c => '<' + tag + '>' + inline(c) + '</' + tag + '>').join(''));
          if (!inTable) inTable = true;
          continue;
        }
        if (inTable) flushTable();
        if (/^#{1,4}\s/.test(line)) {
          flushList();
          const lvl = line.match(/^(#+)/)[1].length;
          const tag = 'h' + Math.min(lvl + 1, 5);
          html += '<' + tag + '>' + inline(line.replace(/^#+\s*/, '')) + '</' + tag + '>';
          continue;
        }
        if (/^[-*]\s/.test(line)) {
          inList = true;
          listItems.push('<li>' + inline(line.replace(/^[-*]\s*/, '')) + '</li>');
          continue;
        }
        if (inList) flushList();
        if (line.trim() === '') { html += ''; continue; }
        html += '<p>' + inline(line) + '</p>';
      }
      flushList(); flushTable();
      return html;
    }

    // Build sidebar nav from page content
    (function() {
      const sidebar = document.getElementById('comp-sidebar');
      if (!sidebar) return;
      let html = '';
      const sections = [];
      const els = document.querySelectorAll('.comp-category, .comp-section > h3');
      els.forEach(el => {
        if (el.classList.contains('comp-category')) {
          html += '<div class="nav-group">' + el.textContent.trim() + '</div>';
        } else {
          const section = el.closest('.comp-section');
          const name = el.textContent.trim();
          const id = 'comp-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
          section.id = id;
          html += '<a href="#' + id + '">' + name + '</a>';
          sections.push(section);

          // Add "Read docs" link inline with h3
          const slug = id.replace('comp-', '');
          const link = document.createElement('a');
          link.className = 'help-link';
          link.href = '#';
          link.dataset.slug = slug;
          link.dataset.name = name;
          link.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Read docs';
          el.style.display = 'flex';
          el.style.alignItems = 'baseline';
          el.style.gap = '0.75rem';
          el.appendChild(link);
        }
      });
      sidebar.innerHTML = html;

      // Scroll highlight with IntersectionObserver
      const links = sidebar.querySelectorAll('a');
      const observer = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + entry.target.id));
          }
        }
      }, { rootMargin: '-80px 0px -70% 0px' });
      sections.forEach(s => observer.observe(s));
    })();

    // Help drawer logic
    (function() {
      const overlay = document.getElementById('help-overlay');
      const drawer = document.getElementById('help-drawer');
      const body = document.getElementById('help-drawer-body');
      const title = document.getElementById('help-drawer-title');
      const closeBtn = document.getElementById('help-drawer-close');
      const cache = {};

      function openDrawer() { overlay.style.display = ''; drawer.style.visibility = ''; drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
      function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = ''; }

      closeBtn.addEventListener('click', closeDrawer);
      overlay.addEventListener('click', closeDrawer);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

      async function fetchDoc(slug) {
        if (cache[slug]) return cache[slug];
        // Try the slug directly first
        const candidates = DOC_SLUGS[slug] ? DOC_SLUGS[slug] : [slug];
        let combined = '';
        for (const name of candidates) {
          try {
            const res = await fetch('docs/components/' + name + '.md');
            if (res.ok) combined += (combined ? '\n\n---\n\n' : '') + await res.text();
          } catch(e) {}
        }
        if (!combined) {
          // Try ai docs as fallback
          for (const name of candidates) {
            try {
              const res = await fetch('docs/ai/components/' + name + '.md');
              if (res.ok) combined += (combined ? '\n\n---\n\n' : '') + await res.text();
            } catch(e) {}
          }
        }
        cache[slug] = combined || null;
        return cache[slug];
      }

      document.addEventListener('click', async e => {
        const btn = e.target.closest('.help-link');
        if (!btn) return;
        e.preventDefault();
        const slug = btn.dataset.slug;
        const name = btn.dataset.name;
        title.textContent = name;
        body.innerHTML = '<p style="opacity:0.5">Loading...</p>';
        openDrawer();
        const md = await fetchDoc(slug);
        if (md) {
          body.innerHTML = mdToHtml(md);
        } else {
          body.innerHTML = '<p style="opacity:0.5">No documentation available yet for this component.</p>';
        }
      });
    })();
  </script>

    .help-drawer-close:hover { opacity: 1; }

    /* Help drawer content */
    .help-drawer-body {
      flex: 1;

    }
    .help-drawer-body h2 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid var(--snice-color-border, rgba(128,128,128,0.2)); padding-bottom: 0.25rem; }
