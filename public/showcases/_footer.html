  <script>
    // Runs after deferred scripts have executed
    document.addEventListener('DOMContentLoaded', function() {

    // Tooltip observer auto-activates when tooltip component loads — no manual call needed

    // Mobile: wrap code blocks in collapsible accordion
    if (window.matchMedia('(max-width: 800px)').matches) {
      document.querySelectorAll('.comp-split-code').forEach(code => {
        const lang = code.querySelector('.code-lang')?.textContent || 'Code';
        const details = document.createElement('details');
        details.className = 'code-accordion';
        const summary = document.createElement('summary');
        summary.textContent = `Show ${lang}`;
        details.appendChild(summary);
        code.parentNode.insertBefore(details, code);
        details.appendChild(code);
      });
    }

    // Doc slug mapping for edge cases
    const DOC_SLUGS = {
      'checkbox-radio-switch': ['checkbox', 'radio', 'switch'],
      'progress-spinner': ['progress', 'spinner'],
      'chart-sparkline': ['chart', 'sparkline'],
      'draw-paint': ['draw', 'paint'],
    };

    // Minimal markdown to HTML
    function mdToHtml(md) {
      let html = '';
      const lines = md.split('\n');
      let inCode = false, codeLang = '', codeLines = [];
      let inTable = false, tableRows = [], hasSeenSeparator = false;
      let inList = false, listItems = [], listType = 'ul';

      function flushList() {
        if (inList) {
          html += '<' + listType + '>' + listItems.join('') + '</' + listType + '>';
          listItems = []; inList = false;
        }
      }
      function flushTable() {
        if (inTable && tableRows.length) {
          html += '<table><thead><tr>' + tableRows[0] + '</tr></thead>';
          if (tableRows.length > 1) {
            html += '<tbody>';
            for (let i = 1; i < tableRows.length; i++) html += '<tr>' + tableRows[i] + '</tr>';
            html += '</tbody>';
          }
          html += '</table>';
          tableRows = []; inTable = false; hasSeenSeparator = false;
        }
      }
      function inline(t) {
        return t
          .replace(/`([^`]+)`/g, (_, code) => '<code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      }

      for (const line of lines) {
        // Code blocks
        if (inCode) {
          if (line.startsWith('```')) {
            const gMap = { html:'grammars/html.json', javascript:'grammars/typescript.json', typescript:'grammars/typescript.json', css:'grammars/css.json', json:'grammars/json.json' };
            const gAttr = gMap[codeLang] ? ' grammar="' + gMap[codeLang] + '"' : '';
            html += '<snice-code-block language="' + codeLang + '"' + gAttr + '>' + codeLines.join('\n').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</snice-code-block>';
            inCode = false; codeLines = [];
          } else {
            codeLines.push(line);
          }
          continue;
        }
        if (line.startsWith('```')) { flushList(); flushTable(); codeLang = line.slice(3).trim() || 'text'; inCode = true; continue; }

        // Skip markdown comments [//]: # (...) and HTML comments <!-- ... -->
        if (/^\[\/\/\]: #/.test(line)) continue;
        if (/^\s*<!--.*-->\s*$/.test(line)) continue;

        // Tables
        if (line.startsWith('|')) {
          flushList();
          const cells = line.replace(/\\\|/g, '\x00').split('|').slice(1, -1).map(c => c.trim().replace(/\x00/g, '|'));
          // Separator row (|---|---|)
          if (cells.every(c => /^[-:]+$/.test(c))) { hasSeenSeparator = true; continue; }
          if (!inTable) { inTable = true; hasSeenSeparator = false; }
          const tag = hasSeenSeparator ? 'td' : 'th';
          tableRows.push(cells.map(c => '<' + tag + '>' + inline(c) + '</' + tag + '>').join(''));
          continue;
        }
        if (inTable) flushTable();

        // Headings
        if (/^#{1,4}\s/.test(line)) {
          flushList();
          const lvl = line.match(/^(#+)/)[1].length;
          const tag = 'h' + Math.min(lvl + 1, 5);
          html += '<' + tag + '>' + inline(line.replace(/^#+\s*/, '')) + '</' + tag + '>';
          continue;
        }

        // Unordered lists
        if (/^[-*]\s/.test(line)) {
          if (inList && listType !== 'ul') flushList();
          inList = true; listType = 'ul';
          listItems.push('<li>' + inline(line.replace(/^[-*]\s*/, '')) + '</li>');
          continue;
        }

        // Ordered lists
        if (/^\d+\.\s/.test(line)) {
          if (inList && listType !== 'ol') flushList();
          inList = true; listType = 'ol';
          listItems.push('<li>' + inline(line.replace(/^\d+\.\s*/, '')) + '</li>');
          continue;
        }

        if (inList) flushList();
        if (line.trim() === '') continue;
        html += '<p>' + inline(line) + '</p>';
      }
      flushList(); flushTable();
      return html;
    }

    (function() {
      const sidebar = document.getElementById('comp-sidebar');

      if (!sidebar || !sectionsWrap) return;

      // Collect categories from DOM (they have data-cat-index)
      const categories = [];
      document.querySelectorAll('.comp-category').forEach(el => {
        categories.push({ el, name: el.textContent.trim(), index: parseInt(el.dataset.catIndex), sections: [] });
      });
      categories.sort((a, b) => a.index - b.index);
      const catByIndex = {};
      categories.forEach(c => catByIndex[c.index] = c);

      // Collect all sections (they have data-category, data-cat-index, data-cat-order)
      const allSections = [];
      document.querySelectorAll('.comp-section > h3').forEach(el => {
        const section = el.closest('.comp-section');
        if (section.style.display === 'none') return; // skip hidden (e.g. spreadsheet)
        const name = el.textContent.trim();
        const id = 'comp-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
        section.id = id;
        const catIndex = parseInt(section.dataset.catIndex);
        const catOrder = parseInt(section.dataset.catOrder);
        const entry = { el: section, name, id, catIndex, catOrder, category: section.dataset.category || '' };
        allSections.push(entry);
        if (catByIndex[catIndex]) catByIndex[catIndex].sections.push(entry);

        // Add "More" link inline with h3
        if (!el.querySelector('.more-link')) {
          const slug = id.replace('comp-', '');

        }

      let scrollObserver = null;
      let currentSort = 'alpha';
      let currentFilter = null; // null = no filter, Set = matched section ids

      function matchesSearch(section, query) {
        const q = query.toLowerCase();
        const name = section.name.toLowerCase();
        // Direct name match
        if (name.includes(q)) return true;
        // Category match
        if (section.category && section.category.toLowerCase().includes(q)) return true;
        // Alias match: check if the query matches any alias that targets this component
        const aliases = aliasIndex[name];
        if (aliases) {
          for (const alias of aliases) {
            if (alias.includes(q) || q.includes(alias)) return true;
          }
        }
        // Forward alias: query is an alias key, check targets with partial match
        for (const [term, targets] of Object.entries(SEARCH_ALIASES)) {
          if (term.includes(q) || q.includes(term)) {
            if (targets.some(t => name.includes(t.toLowerCase()))) return true;
          }
        }
        return false;
      }

      function applyFilter(query) {
        if (!query) {
          currentFilter = null;
          allSections.forEach(s => { s.el.style.display = ''; });
          searchCount.classList.remove('visible');
        } else {
          currentFilter = new Set();
          allSections.forEach(s => {
            if (matchesSearch(s, query)) {
              currentFilter.add(s.id);
              s.el.style.display = '';
            } else {
              s.el.style.display = 'none';
            }
          });
          searchCount.textContent = currentFilter.size + ' of ' + allSections.length;
          searchCount.classList.add('visible');
        }
        buildSidebar(currentSort);
      }

      // Reference node: first category or first section
      const pageTitle = sectionsWrap.querySelector('.page-title');

      // Container for sidebar links (pre-rendered in HTML, enhanced by JS)
      let linksWrap = document.getElementById('comp-sidebar-links') || document.createElement('div');

      function buildSidebar(mode) {
        let html = '';
        const observed = [];

        if (mode === 'category') {
          categories.forEach(cat => {
            const visibleInCat = cat.sections.filter(s => !currentFilter || currentFilter.has(s.id));
            if (currentFilter && visibleInCat.length === 0) return;
            html += '<div class="nav-group">' + cat.name + '</div>';
            visibleInCat.forEach(s => {
              html += '<a href="#' + s.id + '">' + s.name + '</a>';
              observed.push(s.el);
            });
          });
        } else {
          let sorted;
          if (mode === 'alpha') {
            sorted = [...allSections].sort((a, b) => a.name.localeCompare(b.name));
          } else {
            const idx = {};
            POPULAR_ORDER.forEach((n, i) => idx[n] = i);
            sorted = [...allSections].sort((a, b) => (idx[a.name] ?? 999) - (idx[b.name] ?? 999));
          }
          sorted.forEach(s => {
            if (currentFilter && !currentFilter.has(s.id)) return;
            html += '<a href="#' + s.id + '">' + s.name + '</a>';
            observed.push(s.el);
          });
        }

        // Only replace links, not the controls (preserves search focus)
        linksWrap.innerHTML = html;

        // Re-setup scroll observer
        if (scrollObserver) scrollObserver.disconnect();
        const links = linksWrap.querySelectorAll('a[href^="#"]');
        scrollObserver = new IntersectionObserver(() => {
          // Pick the last section whose top has scrolled past the header
          let active = null;
          for (const s of observed) {
            if (s.getBoundingClientRect().top <= 100) active = s;
          }
          if (active) {
            links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + active.id));
          }
        }, { rootMargin: '-80px 0px -70% 0px' });
        observed.forEach(s => scrollObserver.observe(s));
      }

      function reorderDOM(mode) {
        if (mode === 'category') {
          // Show categories, but hide empty ones when filtering
          let order = 0;
          categories.forEach(cat => {
            const hasVisible = !currentFilter || cat.sections.some(s => currentFilter.has(s.id));
            cat.el.style.display = hasVisible ? '' : 'none';
            cat.el.style.order = order++;
            cat.sections.forEach(s => { s.el.style.order = order++; });
          });
        } else {
          let sorted;
          if (mode === 'alpha') {
            sorted = [...allSections].sort((a, b) => a.name.localeCompare(b.name));
          } else {
            const idx = {};
            POPULAR_ORDER.forEach((n, i) => idx[n] = i);
            sorted = [...allSections].sort((a, b) => (idx[a.name] ?? 999) - (idx[b.name] ?? 999));
          }
          sorted.forEach((s, i) => { s.el.style.order = i; });
        }
      }

      function applySort(mode) {
        currentSort = mode;
        reorderDOM(mode);
        // Re-apply filter visibility after reorder
        if (currentFilter) {
          allSections.forEach(s => {
            s.el.style.display = currentFilter.has(s.id) ? '' : 'none';
          });
        }
        buildSidebar(mode);
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === mode));
      }

      // Use pre-rendered DOM elements from _head.html
      const searchDiv = document.getElementById('comp-search');
      const searchInput = document.getElementById('comp-search-input');
      const searchClear = document.getElementById('comp-search-clear');
      const searchCount = document.getElementById('comp-search-count');
      const sortDiv = document.getElementById('sort-controls');

      let searchDebounce;
      searchInput.addEventListener('input', () => {
        clearTimeout(searchDebounce);
        const val = searchInput.value.trim();
        searchDiv.classList.toggle('has-value', val.length > 0);
        searchDebounce = setTimeout(() => applyFilter(val || null), 120);
      });
      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchDiv.classList.remove('has-value');
        applyFilter(null);
        searchInput.focus();
      });

      // Init with alphabetical sort
      applySort('alpha');

      // Focus search on load (desktop only)
      if (window.innerWidth >= 1100) searchInput.focus();

      // Sort button click handlers
      sortDiv.addEventListener('click', e => {
        const btn = e.target.closest('.sort-btn');
        if (!btn || btn.classList.contains('active')) return;
        applySort(btn.dataset.sort);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      // Keyboard shortcut: / to focus search
      document.addEventListener('keydown', e => {
        if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement !== searchInput && !document.activeElement.closest('[contenteditable]') && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
          e.preventDefault();
          searchInput.focus();
        }
        if (e.key === 'Escape' && document.activeElement === searchInput) {
          searchInput.value = '';
          searchDiv.classList.remove('has-value');
          applyFilter(null);
          searchInput.blur();
        }
      });
    })();

    // Hash scroll: wait for all snice-* elements on the page to be defined, then scroll
    (function() {
      const hash = location.hash;
      if (!hash) return;
      const tags = new Set();
      document.querySelectorAll('*').forEach(el => {
        if (el.tagName.includes('-') && el.tagName.toLowerCase().startsWith('snice-')) {
          tags.add(el.tagName.toLowerCase());
        }
      });
      if (!tags.size) return;
      Promise.all([...tags].map(t => customElements.whenDefined(t))).then(() => {
        const target = document.querySelector(hash);
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    })();

    // More panel logic
    (function() {
      const overlay = document.getElementById('help-overlay');
      const drawer = document.getElementById('help-drawer');
      const body = document.getElementById('help-drawer-body');
      const iframe = document.getElementById('help-drawer-iframe');
      const title = document.getElementById('help-drawer-title');
      const closeBtn = document.getElementById('help-drawer-close');
      const tabs = drawer.querySelectorAll('.help-drawer-tab');
      const cache = {};
      let currentSlug = '';
      let currentTab = 'docs';

      function openDrawer() { overlay.style.display = ''; drawer.style.visibility = ''; drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
      function closeDrawer() { drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow = ''; }

      closeBtn.addEventListener('click', closeDrawer);
      overlay.addEventListener('click', closeDrawer);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

      function showTab(tab) {
        currentTab = tab;
        tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        if (tab === 'docs') {
          body.style.display = '';
          iframe.style.display = 'none';
          loadDocs(currentSlug);
        } else {
          body.style.display = 'none';
          iframe.style.display = '';
          loadShowcase(currentSlug);
        }
      }

      tabs.forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));

      async function fetchDoc(slug) {
        if (cache[slug]) return cache[slug];
        const candidates = DOC_SLUGS[slug] ? DOC_SLUGS[slug] : [slug];
        let combined = '';
        for (const name of candidates) {
          try {
            const res = await fetch('docs/components/' + name + '.md');
            if (res.ok) combined += (combined ? '\n\n---\n\n' : '') + await res.text();
          } catch(e) {}
        }
        if (!combined) {
          for (const name of candidates) {
            try {
              const res = await fetch('docs/ai/components/' + name + '.md');
              if (res.ok) combined += (combined ? '\n\n---\n\n' : '') + await res.text();
            } catch(e) {}
          }
        }
        cache[slug] = combined || null;
        return cache[slug];
      }

      async function loadDocs(slug) {
        if (currentTab !== 'docs') return;
        body.innerHTML = '<p style="opacity:0.5">Loading...</p>';
        const md = await fetchDoc(slug);
        if (md) {
          body.innerHTML = mdToHtml(md);
        } else {
          body.innerHTML = '<p style="opacity:0.5">No documentation available yet.</p>';
        }
      }

      const isDev = location.port === '52891' || location.port === '5566';

      function loadShowcase(slug) {
        if (currentTab !== 'showcase') return;
        const candidates = DOC_SLUGS[slug] ? DOC_SLUGS[slug] : [slug];
        const name = candidates[0];
        const src = isDev
          ? '/components/' + name + '/full-showcase.html'
          : 'showcase/' + name + '.html';
        if (!iframe.src || !iframe.src.endsWith(src)) {
          iframe.src = src;
        }
      }

      document.addEventListener('click', async e => {
        const btn = e.target.closest('.more-link');
        if (!btn) return;
        e.preventDefault();
        currentSlug = btn.dataset.slug;
        title.textContent = btn.dataset.name;
        openDrawer();
        showTab(currentTab);
      });
    })();
    }); // DOMContentLoaded
  </script>
  <style>
    /* More link */
    .more-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--snice-color-primary, #3b82f6);
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      margin-top: 0.15rem;
    }
    .more-link:hover {
      text-decoration: underline;
    }
    .more-link svg {
      opacity: 0.8;
    }

    /* Help drawer overlay */
    .help-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      display: none;
    }
    .help-overlay.open {
      display: block;
      opacity: 1;
      pointer-events: auto;
    }

    /* Help drawer panel */
    .help-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(50%, 90vw);
      background: var(--snice-color-background, #1a1a2e);
      border-left: 1px solid var(--snice-color-border, rgba(128,128,128,0.2));
      z-index: 9999;
      transform: translateX(100%);
      transition: transform 0.25s ease, visibility 0s 0.25s;
      display: flex;
      flex-direction: column;
      visibility: hidden;
    }
    .help-drawer.open {
      transform: translateX(0);
      visibility: visible;
      transition: transform 0.25s ease, visibility 0s 0s;
      box-shadow: -4px 0 24px rgba(0,0,0,0.2);
    }
    .help-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem 0.5rem;
      flex-shrink: 0;
    }
    .help-drawer-header h3 {
      margin: 0;
      font-size: 1.1rem;
    }
    .help-drawer-close {
      background: none;
      border: none;
      color: var(--snice-color-text, #eee);
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.6;
      padding: 0 0.25rem;
      line-height: 1;
    }
    .help-drawer-close:hover { opacity: 1; }

    /* Drawer tabs */
    .help-drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--snice-color-border, rgba(128,128,128,0.2));
      flex-shrink: 0;
      padding: 0 1.25rem;
    }
    .help-drawer-tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--snice-color-text-secondary, #aaa);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .help-drawer-tab:hover { color: var(--snice-color-text, #eee); }
    .help-drawer-tab.active {
      color: var(--snice-color-primary, #2563eb);
      border-bottom-color: var(--snice-color-primary, #2563eb);
    }
    .help-drawer-iframe {
      flex: 1;
      border: none;
      width: 100%;
    }

    /* Help drawer content */
    .help-drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--snice-color-text, #ddd);
    }
    .help-drawer-body h2 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid var(--snice-color-border, rgba(128,128,128,0.2)); padding-bottom: 0.25rem; }
    .help-drawer-body h3 { font-size: 1rem; margin: 1.25rem 0 0.4rem; }
    .help-drawer-body h4 { font-size: 0.9rem; margin: 1rem 0 0.3rem; }
    .help-drawer-body p { margin: 0.4rem 0; }
    .help-drawer-body code { background: rgba(128,128,128,0.15); padding: 0.15em 0.35em; border-radius: 3px; font-size: 0.8rem; }
    .help-drawer-body pre { background: var(--snice-color-background-tertiary, #2a2a3e); padding: 0.75rem 1rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
    .help-drawer-body pre code { background: none; padding: 0; font-size: 0.78rem; }
    .help-drawer-body table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.8rem; }
    .help-drawer-body th, .help-drawer-body td { text-align: left; padding: 0.35rem 0.5rem; border: 1px solid var(--snice-color-border, rgba(128,128,128,0.2)); }
    .help-drawer-body th { background: rgba(128,128,128,0.1); font-weight: 600; }
    .help-drawer-body ul { padding-left: 1.25rem; margin: 0.4rem 0; }
    .help-drawer-body li { margin: 0.15rem 0; }
    .help-drawer-body a { color: var(--snice-color-primary, #3b82f6); }
    .help-drawer-body hr { border: none; border-top: 1px solid var(--snice-color-border, rgba(128,128,128,0.2)); margin: 1.5rem 0; }
  </style>
</body>
</html>
