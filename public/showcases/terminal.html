    <div class="comp-section">
      <h3>Terminal</h3>
      <p class="comp-desc">Interactive command-line interface</p>
      <div class="comp-split">
        <div class="comp-split-demo">
          <snice-terminal id="demo-terminal" prompt="$ " style="height:280px"></snice-terminal>
        </div>
        <div class="comp-split-code">
          <span class="code-lang">html</span>
          <pre><code class="language-html">&lt;snice-terminal id="term" prompt="$ "&gt;&lt;/snice-terminal&gt;
&lt;script&gt;
  term.writeln('Welcome!', 'info');
  term.addEventListener('terminal-command', (e) =&gt; {
    term.writeln('You typed: ' + e.detail.command);
  });
&lt;/script&gt;</code></pre>
        </div>
      </div>
    </div>

<script>
// Initialize terminal with boot sequence
    customElements.whenDefined('snice-terminal').then(() => {
      const terminal = document.getElementById('demo-terminal');
      if (terminal) {
        const bootLines = [
          ['[boot] Snice OS v4.5.0', 'info'],
          ['[init] Loading kernel modules...', 'output'],
          ['[init] ├── snice-core       ✓', 'success'],
          ['[init] ├── snice-components ✓', 'success'],
          ['[init] ├── snice-theme      ✓', 'success'],
          ['[init] └── snice-runtime    ✓', 'success'],
          ['[net]  Connecting to network... done', 'output'],
          ['[sys]  Memory: 256MB / 512MB (50%)', 'output'],
          ['[sys]  CPU: 2 cores @ 3.2GHz', 'output'],
          ['', 'output'],
          ['Welcome! Type "help" for commands.', 'info']
        ];
        let i = 0;
        const typeNext = () => {
          if (i < bootLines.length) {
            terminal.writeln(bootLines[i][0], bootLines[i][1]);
            i++;
            setTimeout(typeNext, 80 + Math.random() * 120);
          }
        };
        setTimeout(typeNext, 300);
        terminal.addEventListener('terminal-command', (e) => {
          const { command } = e.detail;
          if (command === 'help') {
            terminal.writeln('Commands: help, clear, echo, date, status, version');
          } else if (command === 'clear') {
            terminal.clear();
          } else if (command === 'date') {
            terminal.writeln(new Date().toLocaleString(), 'success');
          } else if (command === 'status') {
            terminal.writeln('All systems operational ✓', 'success');
          } else if (command === 'version') {
            terminal.writeln('Snice v4.5.0 (build 63ddcac)', 'info');
          } else if (command.startsWith('echo ')) {
            terminal.writeln(command.slice(5));
          } else {
            terminal.writeln('Command not found: ' + command, 'error');
          }
        });
      }
    });
</script>
